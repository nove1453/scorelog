<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreLog Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; overscroll-behavior: none; }
        .score-table th, .score-table td { border: 1px solid #e2e8f0; padding: 10px 4px; text-align: center; }
        .score-table th { background-color: #f1f5f9; font-size: 0.75rem; font-weight: 800; }
        .score-input-cell { width: 100%; text-align: center; background: transparent; border: 2px solid transparent; border-radius: 6px; outline: none; font-size: 1.1rem; font-weight: 700; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .score-input-cell.active { border-color: #10b981; background-color: #f0fdf4; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pos-val { color: #059669 !important; }
        .neg-val { color: #e11d48 !important; }
        .tab-btn { flex: 0 0 auto; padding: 8px 14px; font-size: 12px; font-weight: 900; border-radius: 10px; transition: all 0.2s; white-space: nowrap; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; }
        .tab-btn.active { background: #10b981; color: white; border-color: #10b981; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
        #custom-keypad { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 24px 24px 0 0; }
        #custom-keypad.open { transform: translateY(0); }
        .key-btn { background: white; border-radius: 12px; font-weight: 900; font-size: 1.25rem; display: flex; align-items: center; justify-content: center; height: 54px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .key-btn:active { background: #f1f5f9; transform: scale(0.95); }
        .key-action { background: #f1f5f9; color: #64748b; }
        .key-done { background: #10b981; color: white; }
        .member-sel.selected { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }

        /* Share Card Container (Hidden) */
        #share-card-container { position: absolute; left: -9999px; top: -9999px; width: 400px; background: white; padding: 30px; border: 1px solid #e2e8f0; color: #1e293b; }
        .share-header { border-bottom: 2px solid #10b981; padding-bottom: 10px; margin-bottom: 20px; }
        .share-table { width: 100%; border-collapse: collapse; }
        .share-table th { text-align: left; font-size: 12px; color: #64748b; padding: 8px; border-bottom: 1px solid #e2e8f0; }
        .share-table td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <div id="app-container" class="max-w-md mx-auto flex-1 flex flex-col bg-white shadow-xl relative overflow-hidden">
        
        <header class="p-4 bg-white border-b flex justify-between items-center shrink-0 z-40">
            <div class="flex items-center gap-2">
                <i data-lucide="sparkles" class="text-emerald-500 w-5 h-5"></i>
                <h1 class="text-lg font-black tracking-tighter italic">ScoreLog Pro AI</h1>
            </div>
            <button onclick="app.showNewSetModal()" class="bg-emerald-500 text-white p-2 rounded-full shadow-lg">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar pb-32">
            <!-- 歓迎画面 -->
            <div id="view-welcome" class="flex flex-col items-center justify-center py-20 px-10 text-center space-y-6">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center"><i data-lucide="spade" class="w-10 h-10"></i></div>
                <h2 class="text-2xl font-black italic">ようこそ</h2>
                <button onclick="app.showNewSetModal()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">対局を開始する</button>
            </div>

            <!-- スコア入力画面 -->
            <div id="view-input" class="hidden">
                <div id="view-mode-indicator" class="hidden bg-amber-50 border-b border-amber-100 p-2 flex justify-between items-center px-4">
                    <span class="text-[10px] font-black text-amber-600 uppercase tracking-widest italic">記録を閲覧中</span>
                    <button onclick="app.generateShareImage()" class="bg-amber-500 text-white text-[10px] px-3 py-1 rounded-full font-black flex items-center gap-1 shadow-sm">
                        <i data-lucide="image" class="w-3 h-3"></i> 画像保存用表示
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full score-table border-collapse table-fixed min-w-[320px]">
                        <thead><tr id="player-headers"></tr></thead>
                        <tbody id="score-rows"></tbody>
                        <tfoot class="text-sm">
                            <tr class="bg-slate-50 font-bold">
                                <td class="sticky-col font-black italic">累計</td>
                                <td id="total-0">0</td><td id="total-1">0</td><td id="total-2">0</td><td id="total-3">0</td>
                            </tr>
                            <tr class="text-[10px] text-slate-400 font-bold italic">
                                <td class="sticky-col">チップ</td>
                                <td onclick="app.focusInput('chip', 0, 0)"><div id="chip-val-0" class="score-input-cell">0</div></td>
                                <td onclick="app.focusInput('chip', 0, 1)"><div id="chip-val-1" class="score-input-cell">0</div></td>
                                <td onclick="app.focusInput('chip', 0, 2)"><div id="chip-val-2" class="score-input-cell">0</div></td>
                                <td onclick="app.focusInput('chip', 0, 3)"><div id="chip-val-3" class="score-input-cell">0</div></td>
                            </tr>
                            <tr class="text-[10px] text-slate-400 font-bold italic">
                                <td class="sticky-col font-black text-[8px]">場代(合計)</td>
                                <td colspan="4" onclick="app.focusInput('fee', 0, 0)"><div id="fee-val" class="score-input-cell text-emerald-600">0</div></td>
                            </tr>
                            <tr class="bg-slate-900 text-white font-black">
                                <td class="sticky-col bg-slate-900 text-[10px]">収支<br><span class="text-[7px] opacity-60 font-normal">スコア+チップ</span></td>
                                <td id="income-0">0</td><td id="income-1">0</td><td id="income-2">0</td><td id="income-3">0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div id="input-controls" class="p-4 space-y-3">
                    <button onclick="app.addRow()" class="w-full py-3 bg-slate-100 rounded-xl text-slate-600 font-bold">+ 半荘追加</button>
                    <button id="save-set-btn" onclick="app.saveCurrentSet()" class="w-full py-5 bg-emerald-500 text-white rounded-2xl font-black text-lg shadow-xl italic">保存して終了</button>
                </div>
                <div id="view-controls" class="hidden p-4">
                    <button onclick="app.closeViewRecord()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-xl italic">記録を閉じる</button>
                </div>
            </div>

            <!-- 統計画面 -->
            <div id="view-stats" class="hidden p-4 space-y-4">
                <div class="flex justify-between items-end">
                    <h2 class="text-xl font-black italic">成績統計</h2>
                    <span class="text-[9px] font-bold text-slate-400 italic">グラフ：純収支推移(場代除)</span>
                </div>
                <div class="bg-white border rounded-3xl p-4 shadow-sm"><canvas id="trendChart" height="180"></canvas></div>
                <div class="tabs-container no-scrollbar flex gap-2 overflow-x-auto pb-2" id="stats-tabs"></div>
                <div id="player-stats-list" class="space-y-3"></div>
            </div>

            <!-- 分析画面 -->
            <div id="view-analysis" class="hidden p-4 space-y-4">
                <h2 class="text-xl font-black italic">相性分析</h2>
                <div class="bg-slate-100 p-2 rounded-2xl flex flex-wrap gap-2" id="analysis-chips"></div>
                <div id="analysis-results" class="space-y-4 pt-4">
                    <div id="analysis-placeholder" class="py-20 text-center text-slate-300 font-bold italic">メンバーを選択して分析開始</div>
                </div>
            </div>

            <!-- メンバー/履歴 -->
            <div id="view-members" class="hidden p-4 space-y-4">
                <div class="flex justify-between items-center font-black italic">
                    <span>メンバー管理</span>
                    <button onclick="app.addMemberPrompt()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full font-bold text-xs">+ 追加</button>
                </div>
                <div id="member-list" class="space-y-2"></div>
                <div class="mt-8 pt-6 border-t grid grid-cols-2 gap-3">
                    <button onclick="app.exportData()" class="py-3 bg-slate-100 rounded-xl text-[10px] font-black text-slate-600">バックアップ</button>
                    <button onclick="app.importData()" class="py-3 bg-slate-100 rounded-xl text-[10px] font-black text-slate-600">データ復元</button>
                </div>
            </div>

            <div id="view-history" class="hidden p-4 space-y-4">
                <h2 class="text-xl font-black italic">履歴</h2>
                <div id="history-list" class="space-y-3"></div>
            </div>
        </main>

        <!-- テンキー -->
        <div id="custom-keypad" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-200 p-4 shadow-2xl z-50">
            <div class="flex justify-between items-center mb-3 px-2">
                <span id="keypad-title" class="font-black text-slate-500 text-xs italic uppercase">入力</span>
                <span id="keypad-preview" class="text-xl font-black text-emerald-600">0</span>
            </div>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="app.keyPress('7')" class="key-btn">7</button><button onclick="app.keyPress('8')" class="key-btn">8</button><button onclick="app.keyPress('9')" class="key-btn">9</button><button onclick="app.keyPress('back')" class="key-btn key-action"><i data-lucide="delete"></i></button>
                <button onclick="app.keyPress('4')" class="key-btn">4</button><button onclick="app.keyPress('5')" class="key-btn">5</button><button onclick="app.keyPress('6')" class="key-btn">6</button><button onclick="app.keyPress('-')" class="key-btn key-action">+/-</button>
                <button onclick="app.keyPress('1')" class="key-btn">1</button><button onclick="app.keyPress('2')" class="key-btn">2</button><button onclick="app.keyPress('3')" class="key-btn">3</button><button onclick="app.keyPress('clear')" class="key-btn key-action">C</button>
                <button onclick="app.keyPress('0')" class="key-btn">0</button><button onclick="app.keyPress('00')" class="key-btn text-sm">00</button><button onclick="app.keyPress('.')" class="key-btn">.</button><button onclick="app.closeKeypad()" class="key-btn key-done"><i data-lucide="check"></i></button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around items-center h-16 z-30">
            <button onclick="app.setTab('input')" id="nav-input" class="flex flex-col items-center text-slate-400"><i data-lucide="edit-3" class="w-5 h-5"></i><span class="text-[10px] font-bold">対局</span></button>
            <button onclick="app.setTab('analysis')" id="nav-analysis" class="flex flex-col items-center text-slate-400"><i data-lucide="target" class="w-5 h-5"></i><span class="text-[10px] font-bold">分析</span></button>
            <button onclick="app.setTab('stats')" id="nav-stats" class="flex flex-col items-center text-slate-400"><i data-lucide="bar-chart-3" class="w-5 h-5"></i><span class="text-[10px] font-bold">成績</span></button>
            <button onclick="app.setTab('members')" id="nav-members" class="flex flex-col items-center text-slate-400"><i data-lucide="users" class="w-5 h-5"></i><span class="text-[10px] font-bold">メンバー</span></button>
            <button onclick="app.setTab('history')" id="nav-history" class="flex flex-col items-center text-slate-400"><i data-lucide="archive" class="w-5 h-5"></i><span class="text-[10px] font-bold">履歴</span></button>
        </nav>

        <div id="modal-new-set" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6">
            <div class="bg-white w-full rounded-3xl p-6 space-y-5 max-h-[90vh] flex flex-col">
                <h3 class="text-xl font-black text-center italic">新規対局作成</h3>
                <div class="space-y-4 flex-1 overflow-y-auto no-scrollbar">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="setup-count" class="w-full bg-slate-100 rounded-xl p-3 text-sm font-bold" onchange="app.refreshMemberSelectUI()"><option value="4">4人打ち</option><option value="3">3人打ち</option></select>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 block px-1">スコアレード(円/1pt)</label>
                            <input type="number" id="setup-rate" value="50" class="w-full bg-slate-100 rounded-xl p-3 text-sm font-bold">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 block px-1">チップレート(円/枚)</label>
                            <input type="number" id="setup-chip-rate" value="100" class="w-full bg-slate-100 rounded-xl p-3 text-sm font-bold">
                        </div>
                    </div>
                    <div id="member-select-grid" class="grid grid-cols-2 gap-2"></div>
                </div>
                <button onclick="app.startSet()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black shadow-lg italic uppercase tracking-wider">対局開始</button>
                <button onclick="app.closeModal('modal-new-set')" class="w-full text-slate-400 text-[10px] font-bold">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- シェア画像用隠しコンテナ (シンプルデザイン) -->
    <div id="share-card-container">
        <div class="share-header">
            <div id="share-date-txt" style="font-size: 11px; font-weight: bold; color: #64748b; letter-spacing: 1px;"></div>
            <div style="font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #1e293b;">対局結果レポート</div>
        </div>
        <table class="share-table">
            <thead>
                <tr>
                    <th>プレイヤー</th>
                    <th style="text-align: right;">スコア</th>
                    <th style="text-align: right;">チップ</th>
                    <th style="text-align: right;">収支</th>
                </tr>
            </thead>
            <tbody id="share-table-body"></tbody>
        </table>
        <div style="margin-top: 30px; text-align: center; font-size: 10px; color: #cbd5e1; font-weight: bold; letter-spacing: 2px;">
            GENERATED BY SCORELOG PRO AI
        </div>
    </div>

    <script>
        const app = {
            STORAGE_KEY: 'scorelog_v30_final',
            db: { members: [], history: [], currentSet: null },
            activeField: null,
            currentValue: "0",
            viewingRecord: null,
            selectedAnalysisMembers: [],
            currentStatMode: 'income',
            colors: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'],

            init() {
                const saved = localStorage.getItem(this.STORAGE_KEY);
                if (saved) { try { this.db = JSON.parse(saved); } catch(e) {} }
                if (!this.db.members?.length) this.db.members = [{id:1,name:'かなさ'},{id:2,name:'しぶや'},{id:3,name:'高石さん'},{id:4,name:'たくろう'}];
                this.setTab(this.db.currentSet ? 'input' : 'welcome');
                lucide.createIcons();
            },

            save() { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.db)); },

            setTab(tab) {
                this.viewingRecord = null;
                ['input', 'members', 'stats', 'history', 'welcome', 'analysis'].forEach(v => document.getElementById(`view-${v}`)?.classList.add('hidden'));
                document.getElementById(`view-${tab}`)?.classList.remove('hidden');
                document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-emerald-500', 'text-slate-400'));
                document.getElementById(`nav-${tab}`)?.classList.replace('text-slate-400', 'text-emerald-500');

                if (tab === 'input') this.renderInputTable();
                if (tab === 'stats') this.renderStats(this.currentStatMode);
                if (tab === 'members') this.renderMembers();
                if (tab === 'history') this.renderHistory();
                if (tab === 'analysis') this.renderAnalysisInit();
                lucide.createIcons();
                this.closeKeypad();
            },

            focusInput(type, ri, pi) {
                if (this.viewingRecord) return;
                this.activeField = { type, ri, pi };
                const s = this.db.currentSet;
                if (type === 'score') this.currentValue = String(s.players[pi].scores[ri]);
                else if (type === 'chip') this.currentValue = String(s.players[pi].chip || 0);
                else if (type === 'fee') this.currentValue = String(s.fee || 0);
                
                document.querySelectorAll('.score-input-cell').forEach(el => el.classList.remove('active'));
                let tid = type === 'score' ? `score-val-${ri}-${pi}` : (type === 'chip' ? `chip-val-${pi}` : 'fee-val');
                document.getElementById(tid)?.classList.add('active');
                
                document.getElementById('keypad-preview').innerText = this.currentValue;
                document.getElementById('custom-keypad').classList.add('open');
            },

            applyValue(v) {
                const s = this.db.currentSet; if (!s) return;
                const n = parseFloat(v) || 0;
                const { type, ri, pi } = this.activeField;
                if (type === 'score') s.players[pi].scores[ri] = n;
                else if (type === 'chip') s.players[pi].chip = n;
                else if (type === 'fee') s.fee = n;
                this.renderInputTable();
                this.save();
            },

            renderInputTable() {
                const s = this.viewingRecord || this.db.currentSet;
                if (!s) return;
                const isView = !!this.viewingRecord;
                document.getElementById('view-mode-indicator').classList.toggle('hidden', !isView);
                document.getElementById('input-controls').classList.toggle('hidden', isView);
                document.getElementById('view-controls').classList.toggle('hidden', !isView);

                const h = document.getElementById('player-headers'); h.innerHTML = '<th class="w-10 sticky-col italic text-[9px]">半荘</th>';
                s.players.forEach((p, i) => h.innerHTML += `<th>${p.name}</th>`);
                const rows = document.getElementById('score-rows'); rows.innerHTML = '';
                for (let i = 0; i < s.players[0].scores.length; i++) {
                    let html = `<td class="sticky-col text-slate-300 font-bold text-xs">${i+1}</td>`;
                    s.players.forEach((p, pi) => {
                        const val = p.scores[i];
                        html += `<td onclick="${isView ? '' : `app.focusInput('score', ${i}, ${pi})`}"><div id="score-val-${i}-${pi}" class="score-input-cell ${val > 0 ? 'pos-val' : 'neg-val'}">${val}</div></td>`;
                    });
                    const tr = document.createElement('tr'); tr.innerHTML = html; rows.appendChild(tr);
                }
                this.calcAll();
            },

            calcAll() {
                const s = this.viewingRecord || this.db.currentSet; if (!s) return;
                s.players.forEach((p, pi) => {
                    const pts = p.scores.reduce((a,b)=>a+b,0);
                    // 収支(スコア+チップ) ※統計グラフ用の「純成績」
                    const incomePure = (pts * s.rate) + ((p.chip||0) * s.chipRate);
                    
                    document.getElementById(`total-${pi}`).innerText = pts.toFixed(1);
                    document.getElementById(`income-${pi}`).innerText = Math.round(incomePure).toLocaleString() + "円";
                    document.getElementById(`income-${pi}`).className = incomePure >= 0 ? 'pos-val' : 'neg-val';
                    document.getElementById(`chip-val-${pi}`).innerText = p.chip || 0;
                });
                document.getElementById('fee-val').innerText = s.fee || 0;
            },

            async generateShareImage() {
                const s = this.viewingRecord; if (!s) return;
                document.getElementById('share-date-txt').innerText = new Date(s.date).toLocaleDateString();
                const body = document.getElementById('share-table-body'); body.innerHTML = '';
                
                s.players.forEach(p => {
                    const pts = p.scores.reduce((a,b)=>a+b,0);
                    const inc = (pts * s.rate) + ((p.chip||0) * s.chipRate);
                    body.innerHTML += `<tr>
                        <td>${p.name}</td>
                        <td style="text-align: right;">${pts.toFixed(1)}</td>
                        <td style="text-align: right;">${p.chip||0}</td>
                        <td style="text-align: right; color: ${inc>=0?'#059669':'#e11d48'};">${Math.round(inc).toLocaleString()}</td>
                    </tr>`;
                });

                try {
                    const canvas = await html2canvas(document.getElementById('share-card-container'), { scale: 2 });
                    const dataUrl = canvas.toDataURL("image/png");
                    const newTab = window.open();
                    newTab.document.write(`<body style="margin:0; background:#f1f5f9; display:flex; justify-content:center; align-items:center; height:100vh;"><img src="${dataUrl}" style="max-width:95%; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); border-radius: 8px;"></body>`);
                } catch (e) { alert("画像生成エラー"); }
            },

            renderStats(mode) {
                this.currentStatMode = mode;
                const tc = document.getElementById('stats-tabs'); tc.innerHTML = '';
                const tabs = [
                    {k:'income', l:'純収支'}, {k:'pts', l:'スコア'}, {k:'top', l:'トップ率'}, 
                    {k:'rentai', l:'連対率'}, {k:'avg', l:'平均順位'}, {k:'last', l:'ラス率'}
                ];
                tabs.forEach(t => {
                    const b = document.createElement('button'); b.className = `tab-btn ${mode === t.k ? 'active' : 'inactive'}`;
                    b.innerText = t.l; b.onclick = () => this.renderStats(t.k); tc.appendChild(b);
                });

                const stats = {};
                this.db.history.forEach(h => {
                    h.players.forEach(p => {
                        if (!stats[p.name]) stats[p.name] = { income:0, pts:0, games:0, r1:0, r2:0, r4:0, rSum:0 };
                        const s = stats[p.name];
                        // 統計は「純収支（場代を引く前）」の累計
                        const ptsSum = p.scores.reduce((a,b)=>a+b,0);
                        s.income += (ptsSum * h.rate) + ((p.chip||0) * h.chipRate);
                        p.scores.forEach((sc, idx) => {
                            s.games++;
                            s.pts += sc;
                            const ranks = h.players.map(pl => pl.scores[idx]).sort((a,b)=>b-a);
                            const rank = ranks.indexOf(sc) + 1;
                            s.rSum += rank;
                            if (rank === 1) s.r1++;
                            if (rank === 2) s.r2++;
                            if (rank === 4) s.r4++;
                        });
                    });
                });

                const list = document.getElementById('player-stats-list'); list.innerHTML = '';
                Object.entries(stats).sort((a,b) => {
                    if(mode === 'income') return b[1].income - a[1].income;
                    if(mode === 'pts') return b[1].pts - a[1].pts;
                    if(mode === 'top') return (b[1].r1/b[1].games) - (a[1].r1/a[1].games);
                    if(mode === 'rentai') return ((b[1].r1+b[1].r2)/b[1].games) - ((a[1].r1+a[1].r2)/a[1].games);
                    if(mode === 'avg') return (a[1].rSum/a[1].games) - (b[1].rSum/b[1].games);
                    if(mode === 'last') return (b[1].r4/b[1].games) - (a[1].r4/a[1].games);
                }).forEach(([name, s]) => {
                    let val = "";
                    if(mode==='income') val = Math.round(s.income).toLocaleString() + "円";
                    else if(mode==='pts') val = s.pts.toFixed(1) + "pt";
                    else if(mode==='top') val = (s.r1/s.games*100).toFixed(1) + "%";
                    else if(mode==='rentai') val = ((s.r1+s.r2)/s.games*100).toFixed(1) + "%";
                    else if(mode==='avg') val = (s.rSum/s.games).toFixed(2);
                    else if(mode==='last') val = (s.r4/s.games*100).toFixed(1) + "%";

                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div class="font-black italic">${name} <span class="text-[9px] text-slate-300 not-italic ml-2">${s.games}局</span></div>
                        <div class="font-black ${val.includes('-') || (mode==='avg' && parseFloat(val)>2.5) ? 'neg-val' : 'pos-val'}">${val}</div>
                    </div>`;
                });
                this.updateTrendChart();
            },

            updateTrendChart() {
                const ctx = document.getElementById('trendChart').getContext('2d');
                if (this.trendChart) this.trendChart.destroy();
                const datasets = this.db.members.map((m, i) => {
                    let bal = 0;
                    const data = [0, ...this.db.history.slice().reverse().map(h => {
                        const p = h.players.find(pl => pl.name === m.name);
                        if (p) {
                            const pts = p.scores.reduce((a,b)=>a+b,0);
                            bal += (pts * h.rate) + ((p.chip||0) * h.chipRate);
                        }
                        return bal;
                    })];
                    return { label: m.name, data, borderColor: this.colors[i % this.colors.length], borderWidth: 3, tension: 0.3, pointRadius: 0 };
                });
                this.trendChart = new Chart(ctx, { 
                    type: 'line', 
                    data: { labels: Array(datasets[0]?.data.length || 0).fill(''), datasets }, 
                    options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#f1f5f9' } } } } 
                });
            },

            saveCurrentSet() {
                if(confirm("対局を保存しますか？")) {
                    const s = this.db.currentSet;
                    s.players.forEach(p => {
                        const pts = p.scores.reduce((a,b)=>a+b,0);
                        // 履歴（財布の増減）＝(スコア+チップ) - 場代負担分
                        p.settlement = (pts * s.rate) + ((p.chip||0) * s.chipRate) - (s.fee / s.playerCount);
                    });
                    this.db.history.unshift(JSON.parse(JSON.stringify(s)));
                    this.db.currentSet = null; this.save(); this.setTab('history');
                }
            },

            renderHistory() {
                const l = document.getElementById('history-list'); l.innerHTML = '';
                this.db.history.forEach((h, i) => {
                    let ps = ''; h.players.forEach(p => ps += `<div class="flex justify-between text-xs"><span>${p.name}</span><span class="font-bold ${p.settlement<0?'neg-val':'pos-val'}">${Math.round(p.settlement).toLocaleString()}円</span></div>`);
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl border shadow-sm active:scale-95 transition-all";
                    div.onclick = () => { this.viewingRecord = this.db.history[i]; this.setTab('input'); };
                    div.innerHTML = `<div class="flex justify-between items-center border-b mb-2 pb-1 text-[9px] text-slate-300 font-black italic">
                        <span>${new Date(h.date).toLocaleString()} (精算額)</span>
                        <button onclick="event.stopPropagation(); app.delHistory(${i})"><i data-lucide="trash-2" class="w-3 h-3 text-slate-200"></i></button>
                    </div>${ps}`;
                    l.appendChild(div);
                });
                lucide.createIcons();
            },

            runAnalysis() {
                const results = document.getElementById('analysis-results');
                if (this.selectedAnalysisMembers.length === 0) { results.innerHTML = `<div class="py-20 text-center text-slate-300 font-bold italic">メンバーを選択して分析開始</div>`; return; }
                results.innerHTML = `<h3 class="font-black text-sm italic text-slate-400 uppercase tracking-widest">直接対局データ</h3>`;
                this.selectedAnalysisMembers.forEach(target => {
                    const stats = {};
                    this.db.history.forEach(h => {
                        const pT = h.players.find(p => p.name === target);
                        if (!pT) return;
                        h.players.forEach(opp => {
                            if (opp.name === target || !this.selectedAnalysisMembers.includes(opp.name)) return;
                            if (!stats[opp.name]) stats[opp.name] = { games: 0, win: 0, diff: 0 };
                            stats[opp.name].games += pT.scores.length;
                            const tInc = (pT.scores.reduce((a,b)=>a+b,0) * h.rate) + ((pT.chip||0) * h.chipRate);
                            const oInc = (opp.scores.reduce((a,b)=>a+b,0) * h.rate) + ((opp.chip||0) * h.chipRate);
                            stats[opp.name].diff += (tInc - oInc);
                            pT.scores.forEach((ts, idx) => { if (ts > opp.scores[idx]) stats[opp.name].win++; });
                        });
                    });
                    if (Object.keys(stats).length > 0) {
                        let html = `<div class="mb-6"><div class="text-[10px] font-black text-emerald-600 italic bg-emerald-50 px-2 py-1 rounded inline-block">${target} の戦績</div>`;
                        Object.entries(stats).forEach(([name, data]) => {
                            html += `<div class="bg-white p-3 rounded-xl border mt-2 flex justify-between items-center">
                                <div><div class="font-bold">${name} 相手</div><div class="text-[9px] text-slate-400 font-bold">${data.games}局</div></div>
                                <div class="text-right font-black ${data.diff >= 0 ? 'pos-val' : 'neg-val'}">${Math.round(data.diff).toLocaleString()}円</div>
                            </div>`;
                        });
                        results.innerHTML += html + `</div>`;
                    }
                });
            },

            renderAnalysisInit() {
                const container = document.getElementById('analysis-chips'); container.innerHTML = '';
                this.db.members.forEach(m => {
                    const isSel = this.selectedAnalysisMembers.includes(m.name);
                    const btn = document.createElement('button');
                    btn.className = `px-4 py-2 rounded-full border text-xs font-bold transition-all ${isSel ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-600'}`;
                    btn.innerText = m.name; btn.onclick = () => {
                        if (isSel) this.selectedAnalysisMembers = this.selectedAnalysisMembers.filter(n => n !== m.name);
                        else if (this.selectedAnalysisMembers.length < 4) this.selectedAnalysisMembers.push(m.name);
                        this.renderAnalysisInit(); this.runAnalysis();
                    };
                    container.appendChild(btn);
                });
            },

            startSet() {
                const sel = Array.from(document.querySelectorAll('.member-sel.selected')).map(s => ({ name: s.innerText, scores: [0], chip: 0 }));
                if (sel.length < 3) return alert("3人以上選択してください");
                this.db.currentSet = { date: new Date().toISOString(), playerCount: sel.length, rate: parseInt(document.getElementById('setup-rate').value)||50, chipRate: parseInt(document.getElementById('setup-chip-rate').value)||100, players: sel, fee: 0 };
                this.save(); this.closeModal('modal-new-set'); this.setTab('input');
            },
            keyPress(k) {
                let v = this.currentValue;
                if (k === 'back') v = v.length > 1 ? v.slice(0, -1) : "0";
                else if (k === 'clear') v = "0";
                else if (k === '-') v = v.startsWith('-') ? v.slice(1) : (v === "0" ? "-" : "-" + v);
                else if (k === '.') { if(!v.includes('.')) v += '.'; }
                else v = (v === "0") ? k : v + k;
                this.currentValue = v; document.getElementById('keypad-preview').innerText = v; this.applyValue(v);
            },
            closeKeypad() { document.getElementById('custom-keypad').classList.remove('open'); document.querySelectorAll('.score-input-cell').forEach(el => el.classList.remove('active')); },
            addRow() { if(this.db.currentSet) { this.db.currentSet.players.forEach(p => p.scores.push(0)); this.renderInputTable(); this.save(); } },
            showNewSetModal() { this.refreshMemberSelectUI(); this.openModal('modal-new-set'); },
            refreshMemberSelectUI() {
                const g = document.getElementById('member-select-grid'); g.innerHTML = '';
                this.db.members.forEach(m => {
                    const b = document.createElement('button'); b.className = 'member-sel border p-3 rounded-xl text-xs font-bold bg-slate-50';
                    b.innerText = m.name; b.onclick = () => b.classList.toggle('selected'); g.appendChild(b);
                });
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },
            renderMembers() {
                const l = document.getElementById('member-list'); l.innerHTML = '';
                this.db.members.forEach(m => {
                    l.innerHTML += `<div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm"><span class="font-black italic">${m.name}</span><button onclick="app.delMember(${m.id})" class="text-slate-200"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
                });
                lucide.createIcons();
            },
            addMemberPrompt() { 
                const n = prompt("名前を入力"); if(n && n.trim()) { this.db.members.push({id:Date.now(), name:n.trim()}); this.save(); this.renderMembers(); } 
            },
            delMember(id) { 
                if(confirm("削除しますか？")) { this.db.members = this.db.members.filter(m=>m.id!==id); this.save(); this.renderMembers(); } 
            },
            delHistory(i) { if(confirm("削除しますか？")) { this.db.history.splice(i,1); this.save(); this.renderHistory(); } },
            exportData() { const s = JSON.stringify(this.db); const el = document.createElement('textarea'); el.value = s; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("コピーしました"); },
            importData() { const s = prompt("データを貼り付け"); if(s) { try { this.db = JSON.parse(s); this.save(); location.reload(); } catch(e) { alert("形式エラー"); } } },
            closeViewRecord() { this.viewingRecord = null; this.setTab('history'); }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
