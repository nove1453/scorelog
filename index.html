<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>ScoreLog Pro AI - V9.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        :root { --app-max-width: 450px; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f8fafc; overscroll-behavior-y: contain; margin: 0; padding: 0; user-select: none; }
        .app-container { max-width: var(--app-max-width); margin: 0 auto; min-height: 100vh; background: #ffffff; box-shadow: 0 0 40px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .key-btn { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; font-weight: 900; font-size: 1.25rem; height: 54px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; box-shadow: 0 2px 0 #e2e8f0; }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #e2e8f0; background: #f1f5f9; }
        .key-btn-dark { background: #1e293b; color: white; box-shadow: 0 2px 0 #0f172a; }
        input[type="date"] { background: #f1f5f9; border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: bold; color: #475569; border: none; }
        .animate-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const STORAGE_KEY = 'scorelog_v96_stable';

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = ''; 
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2'));
                    iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const COMMENT_DATA = {
            "SSS": "牌が全部味方していた", "SSA": "勝負強さが異常", "SSB": "爆発力で卓を支配", "SSC": "荒れながらも勝ち切った",
            "SAS": "安定感と決定力の両立", "SAA": "王者の麻雀", "SAB": "押し引きが完璧", "SAC": "豪快トップ量産型",
            "SBS": "トップ取り性能が高すぎる", "SBA": "勝負所を逃さない", "SBB": "火力特化型麻雀", "SBC": "乱打戦の申し子",
            "SCS": "トップは正義を体現", "SCA": "大物手でねじ伏せた", "SCB": "荒波を制した", "SCC": "ギャンブラー気質全開",
            "ASS": "隙のない安定麻雀", "ASA": "卓全体をコントロール", "ASB": "冷静に勝ちを拾った", "ASC": "勝負勘が冴えていた",
            "AAS": "高水準でまとまった", "AAA": "非常に完成度が高い", "AAB": "安定感が光った", "AAC": "強気な押しが刺さった",
            "ABS": "要所をしっかり制圧", "ABA": "バランス型の好成績", "ABB": "堅実な立ち回り", "ABC": "勝負どころで光った",
            "ACS": "着実にポイントを積んだ", "ACA": "浮き沈みを抑えた", "ACB": "丁寧な麻雀だった", "ACC": "危なげなくまとめた",
            "BSS": "トップこそ少ないが強い", "BSA": "安定して浮いていた", "BSB": "守備力が優秀", "BSC": "粘り勝ちの展開",
            "BAS": "堅実な成績を記録", "BAA": "手堅くまとめ上げた", "BAB": "大崩れしない麻雀", "BAC": "慎重派スタイル",
            "BBS": "静かに勝ち切った", "BBA": "無難に戦い抜いた", "BBB": "平均的にまとまった", "BBC": "平場巧者タイプ",
            "BCS": "耐えて耐えて浮上", "BCA": "放銃回避が光った", "BCB": "あと一歩届かず", "BCC": "地味ながら奮闘",
            "CSS": "トップは遠いが安定感あり", "CSA": "耐久型ファイター", "CSB": "ラス回避重視スタイル", "CSC": "守備寄りの麻雀",
            "CAS": "浮き沈みの激しい展開", "CAA": "今日は波に乗れず", "CAB": "苦しい時間が長かった", "CAC": "あと一歩噛み合わず",
            "CBS": "守り切れなかった", "CBA": "勝負手が空回り", "CBB": "展開に恵まれなかった", "CBC": "苦戦気味の内容",
            "CCS": "今日は牌が敵だった", "CCA": "放銃が重かった", "CCB": "厳しい展開が続いた", "CCC": "また次回リベンジ"
        };

        const App = () => {
            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {
                    members: [{ id: 1, name: 'プレイヤー1' }, { id: 2, name: 'プレイヤー2' }, { id: 3, name: 'プレイヤー3' }, { id: 4, name: 'プレイヤー4' }],
                    history: [], currentSet: null
                };
            });

            const [activeTab, setActiveTab] = useState('welcome');
            const [activeField, setActiveField] = useState(null); 
            const [tempValue, setTempValue] = useState("");
            const [viewingRecordIndex, setViewingRecordIndex] = useState(null);
            
            const [statStartDate, setStatStartDate] = useState("");
            const [statEndDate, setStatEndDate] = useState("");
            const [statSelectedNames, setStatSelectedNames] = useState([]);
            const [statType, setStatType] = useState('income');

            const [selectedAnalysisMembers, setSelectedAnalysisMembers] = useState([]);
            const [showMemberEditor, setShowMemberEditor] = useState(false);
            const [showNewSetModal, setShowNewSetModal] = useState(false);
            const [modalSetup, setModalSetup] = useState({ rate: 50, chipRate: 100, selectedIds: [] });
            
            const [isEditingBackup, setIsEditingBackup] = useState(false);
            const [backupText, setBackupText] = useState("");

            const chartRef = useRef(null);
            const trendChartInstance = useRef(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
                if (db.currentSet && activeTab === 'welcome') setActiveTab('input');
            }, [db, activeTab]);

            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];

            const getChipPoints = (chip, rate, chipRate) => {
                const r = parseFloat(rate) || 0;
                const cr = parseFloat(chipRate) || 0;
                const c = parseFloat(chip) || 0;
                if (r === 0) return 0;
                return c * (cr / r);
            };

            const viewingRecord = useMemo(() => {
                return viewingRecordIndex !== null ? db.history[viewingRecordIndex] : null;
            }, [db.history, viewingRecordIndex]);

            // 安全な計算ヘルパー
            const calcPlayerStats = (source) => {
                if (!source) return [];
                return source.players.map(p => {
                    const scoreTotal = (p.scores || []).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                    const rate = parseFloat(source.rate) || 0;
                    const chipRate = parseFloat(source.chipRate) || 0;
                    const chipCount = parseFloat(p.chip) || 0;
                    const fee = parseFloat(p.fee) || 0;
                    
                    const chipPoint = getChipPoints(chipCount, rate, chipRate);
                    const income = (scoreTotal * rate) + (chipCount * chipRate) - fee;
                    
                    return { ...p, scoreTotal, income };
                });
            };

            const currentPlayersData = useMemo(() => {
                const source = viewingRecord || db.currentSet;
                return calcPlayerStats(source);
            }, [db.currentSet, viewingRecord]);

            const getOneLiner = (ranks) => {
                const total = ranks.length;
                if (total === 0) return "";
                const topCount = ranks.filter(r => r === 1).length;
                const topRate = (topCount / total) * 100;
                const secondCount = ranks.filter(r => r <= 2).length;
                const secondRate = (secondCount / total) * 100;
                const avgRank = ranks.reduce((a, b) => a + b, 0) / total;

                let tCode = "C";
                if (topRate >= 40) tCode = "S";
                else if (topRate >= 30) tCode = "A";
                else if (topRate >= 20) tCode = "B";

                let rCode = "C";
                if (secondRate >= 70) rCode = "S";
                else if (secondRate >= 55) rCode = "A";
                else if (secondRate >= 40) rCode = "B";

                let aCode = "C";
                if (avgRank < 2.00) aCode = "S";
                else if (avgRank <= 2.29) aCode = "A";
                else if (avgRank <= 2.59) aCode = "B";

                const key = tCode + rCode + aCode;
                return COMMENT_DATA[key] || "安定した麻雀でした";
            };

            const generateShareImage = () => {
                if (!viewingRecord) return;
                const h = viewingRecord;
                const roundCount = h.players[0].scores.length;
                const dateStr = new Date(h.date).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
                
                const stats = calcPlayerStats(h);
                const summary = stats.map(p => {
                    const ranks = [];
                    for(let i=0; i<roundCount; i++) {
                        const rScores = h.players.map(pl => ({n:pl.name, s:parseFloat(pl.scores[i]) || 0}));
                        rScores.sort((a,b) => b.s - a.s);
                        ranks.push(rScores.findIndex(x => x.n === p.name) + 1);
                    }
                    return { name: p.name, totalPt: p.scoreTotal + getChipPoints(p.chip, h.rate, h.chipRate), netIncome: p.income, ranks, scores: p.scores };
                });

                summary.sort((a, b) => b.totalPt - a.totalPt);

                const newWindow = window.open("", "_blank");
                if (!newWindow) return;

                const headerHtml = 
                    '<div class="header">' +
                        '<div class="flex justify-between items-center px-4 opacity-70">' +
                            '<span class="text-3xl font-black italic">中</span>' +
                            '<span class="text-3xl font-black italic">發</span>' +
                        '</div>' +
                        '<div class="bg-white/20 inline-block px-4 py-1 rounded-full text-xs font-bold mb-1">' + dateStr + ' セット</div>' +
                        '<h1 class="text-xl font-black">' + roundCount + '半荘 / 4人打ち</h1>' +
                    '</div>';

                const rankItemsHtml = summary.map((s, idx) => {
                    const rankClass = 'rank-' + (idx + 1);
                    const icon = idx === 0 ? '🏆' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '👤';
                    const incomeStr = (s.netIncome >= 0 ? '+' : '') + Math.round(s.netIncome).toLocaleString();
                    const incomeColor = s.netIncome >= 0 ? 'text-slate-800' : 'text-rose-600';
                    const comment = getOneLiner(s.ranks);

                    return '<div class="rank-item ' + rankClass + '">' +
                        '<div class="flex-shrink-0 relative">' +
                            '<div class="avatar flex items-center justify-center font-black text-2xl text-slate-400">' + icon + '</div>' +
                            '<div class="absolute -top-2 -left-2 bg-slate-900 text-white w-7 h-7 rounded-full flex items-center justify-center font-black border-2 border-white text-sm">' +
                                (idx + 1) + '<span class="text-[8px] ml-0.5">位</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex items-center">' +
                                '<span class="font-black text-lg truncate">' + s.name + '</span>' +
                            '</div>' +
                            '<div class="bg-white/60 inline-block px-3 py-0.5 rounded-full text-[10px] font-bold text-slate-600 mt-1">' +
                                '👑 ' + comment +
                            '</div>' +
                        '</div>' +
                        '<div class="text-right">' +
                            '<div class="font-black text-xl italic ' + incomeColor + '">' + incomeStr +
                                '<span class="text-xs font-normal ml-0.5 not-italic">円</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');

                const tableHeader = '<thead><tr class="bg-emerald-50 text-emerald-800 font-black"><th class="py-2 border-b border-white">半荘</th>' +
                    h.players.map(p => '<th class="py-2 border-b border-white">' + p.name + '</th>').join('') +
                    '</tr></thead>';

                const scoreRowsHtml = Array.from({ length: roundCount }).map((_, ri) => {
                    const cells = h.players.map(p => {
                        const val = parseFloat(p.scores[ri]) || 0;
                        const colorClass = val > 0 ? 'text-blue-500' : val < 0 ? 'text-rose-500' : 'text-slate-400';
                        const sign = val > 0 ? '+' : '';
                        return '<td class="py-2 font-bold ' + colorClass + '">' + sign + val + '</td>';
                    }).join('');
                    const rowClass = ri % 2 === 0 ? 'bg-white' : 'bg-slate-50/50';
                    return '<tr class="' + rowClass + '"><td class="py-2 font-black text-slate-300 border-r border-slate-100">' + (ri + 1) + '半荘</td>' + cells + '</tr>';
                }).join('');

                const fullHtml = 
                    '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Mahjong Report</title>' +
                    '<script src="https://cdn.tailwindcss.com"></scr' + 'ipt>' +
                    '<style>' +
                        '@import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap");' +
                        'body { font-family: "Noto Sans JP", sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }' +
                        '.report-card { width: 450px; background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 8px solid #14532d; }' +
                        '.header { background: #14532d; color: white; padding: 20px; text-align: center; position: relative; }' +
                        '.header::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 15px solid #14532d; }' +
                        '.rank-item { display: flex; align-items: center; padding: 15px 20px; margin: 10px; border-radius: 20px; position: relative; }' +
                        '.rank-1 { background: linear-gradient(135deg, #fef9c3 0%, #fde047 100%); border: 2px solid #eab308; }' +
                        '.rank-2 { background: #f1f5f9; border: 2px solid #cbd5e1; }' +
                        '.rank-3 { background: #fff7ed; border: 2px solid #fed7aa; }' +
                        '.rank-4 { background: #eff6ff; border: 2px solid #bfdbfe; }' +
                        '.avatar { width: 60px; height: 60px; border-radius: 50%; background: #eee; margin-right: 15px; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }' +
                    '</style></head><body>' +
                    '<div class="report-card">' + headerHtml +
                        '<div class="p-2 pt-6">' + rankItemsHtml + '</div>' +
                        '<div class="p-6">' +
                            '<h3 class="text-center font-black text-sm mb-4 text-slate-400">各半荘の結果 (pt)</h3>' +
                            '<div class="bg-slate-50 rounded-2xl overflow-hidden border border-slate-100">' +
                                '<table class="w-full text-center text-[11px]">' +
                                    tableHeader + '<tbody>' + scoreRowsHtml + '</tbody>' +
                                '</table></div></div>' +
                        '<div class="bg-slate-900 text-white py-4 text-center text-[10px] font-black italic tracking-widest uppercase opacity-80">Generated by ScoreLog Pro AI</div>' +
                    '</div></body></html>';

                newWindow.document.write(fullHtml);
                newWindow.document.close();
            };

            const stats = useMemo(() => {
                const res = {};
                const filteredHistory = [...db.history].filter(h => {
                    const hDate = h.date.split('T')[0];
                    if (statStartDate && hDate < statStartDate) return false;
                    if (statEndDate && hDate > statEndDate) return false;
                    return true;
                }).sort((a, b) => new Date(a.date) - new Date(b.date));

                filteredHistory.forEach(h => {
                    const hDate = h.date.split('T')[0];
                    const roundCount = (h.players[0].scores || []).length;
                    for (let ri = 0; ri < roundCount; ri++) {
                        const roundScores = h.players.map(p => ({ name: p.name, score: parseFloat(p.scores[ri]) || 0 }));
                        const sorted = [...roundScores].sort((a, b) => b.score - a.score);
                        roundScores.forEach(ps => {
                            if (!res[ps.name]) res[ps.name] = { income: 0, scorePure: 0, scoreWithChip: 0, ranks: [], games: 0, history: [] };
                            const s = res[ps.name];
                            const rank = sorted.findIndex(x => x.name === ps.name) + 1;
                            if (rank > 0) {
                                s.ranks.push(rank);
                                s.games += 1;
                            }
                        });
                    }
                    const playerStats = calcPlayerStats(h);
                    playerStats.forEach(p => {
                        const s = res[p.name];
                        if (s) {
                            s.income += p.income;
                            const rate = parseFloat(h.rate) || 0;
                            const chipRate = parseFloat(h.chipRate) || 0;
                            const scoreWithChipVal = p.scoreTotal + getChipPoints(p.chip, rate, chipRate);
                            s.scoreWithChip += scoreWithChipVal;
                            s.history.push({ date: hDate, income: p.income, scoreWithChip: scoreWithChipVal });
                        }
                    });
                });
                return res;
            }, [db.history, statStartDate, statEndDate]);

            const sortedStatNames = useMemo(() => {
                const names = Object.keys(stats);
                return names.sort((a, b) => {
                    const sa = stats[a], sb = stats[b];
                    const getRate = (s, r) => s.ranks.filter(x => x === r).length / s.games || 0;
                    const getAvg = (s) => s.ranks.reduce((p, c) => p + c, 0) / s.games || 0;
                    switch(statType) {
                        case 'income': return sb.income - sa.income;
                        case 'scoreWithChip': return sb.scoreWithChip - sa.scoreWithChip;
                        case 'topRate': return getRate(sb, 1) - getRate(sa, 1);
                        case 'secondRate': return (getRate(sb, 1) + getRate(sb, 2)) - (getRate(sa, 1) + getRate(sa, 2));
                        case 'lastRate': return getRate(sa, 4) - getRate(sb, 4);
                        case 'avgRank': return getAvg(sa) - getAvg(sb);
                        default: return 0;
                    }
                });
            }, [stats, statType]);

            useEffect(() => {
                if (activeTab === 'stats' && chartRef.current) {
                    if (trendChartInstance.current) trendChartInstance.current.destroy();
                    const allNames = Object.keys(stats);
                    const targetNames = statSelectedNames.length > 0 ? statSelectedNames : sortedStatNames.slice(0, 3);
                    const dateLabels = Array.from(new Set(Object.values(stats).flatMap(s => s.history.map(h => h.date)))).sort();
                    const datasets = targetNames.map((name) => {
                        let running = 0;
                        const ps = stats[name];
                        const dataPoints = [0]; 
                        dateLabels.forEach(date => {
                            const daily = ps.history.filter(h => h.date === date);
                            daily.forEach(m => {
                                if (statType === 'income') running += m.income;
                                else if (statType === 'scoreWithChip') running += m.scoreWithChip;
                            });
                            dataPoints.push(running);
                        });
                        return { label: name, data: dataPoints, borderColor: colors[allNames.indexOf(name) % colors.length], borderWidth: 3, tension: 0.2, pointRadius: 3, pointBackgroundColor: '#fff' };
                    });
                    trendChartInstance.current = new Chart(chartRef.current.getContext('2d'), {
                        type: 'line', data: { labels: ['', ...dateLabels], datasets },
                        options: { plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { ticks: { font: { size: 8 }, maxRotation: 45 }, grid: { display: false } }, y: { grid: { color: '#f1f5f9' } } }, maintainAspectRatio: false }
                    });
                }
            }, [activeTab, stats, statSelectedNames, statType, sortedStatNames]);

            const applyValue = () => {
                if (!activeField) return;
                const val = parseFloat(tempValue) || 0;
                const newDb = JSON.parse(JSON.stringify(db));
                
                let targetSet;
                if (activeTab === 'input' && !viewingRecord) {
                    targetSet = newDb.currentSet;
                } else if (viewingRecordIndex !== null) {
                    targetSet = newDb.history[viewingRecordIndex];
                }

                if (targetSet) {
                    if (activeField.type === 'score') targetSet.players[activeField.pi].scores[activeField.ri] = val;
                    else if (activeField.type === 'chip') targetSet.players[activeField.pi].chip = val;
                    else if (activeField.type === 'fee') targetSet.players[activeField.pi].fee = val;
                    setDb(newDb);
                }
                setActiveField(null); 
                setTempValue("");
            };

            const handleKeyClick = (key) => {
                if (key === 'CLEAR') setTempValue("");
                else if (key === 'DEL') setTempValue(prev => prev.slice(0, -1));
                else if (key === '+/-') setTempValue(prev => prev.startsWith('-') ? prev.slice(1) : (prev === "" ? "-" : "-" + prev));
                else if (key === 'DONE') applyValue();
                else setTempValue(prev => prev + key);
            };

            const handleBack = () => {
                if (viewingRecordIndex !== null) {
                    setViewingRecordIndex(null);
                    setActiveTab('history');
                } else if (activeTab !== 'welcome') {
                    if (db.currentSet) setActiveTab('input');
                    else setActiveTab('welcome');
                }
            };

            return (
                <div className="app-container">
                    <header className="p-4 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            {(viewingRecordIndex !== null || (activeTab !== 'welcome' && activeTab !== 'input')) && (
                                <button onClick={handleBack} className="p-2 -ml-2 text-slate-400 hover:text-slate-900 transition-colors">
                                    <Icon name="ArrowLeft" />
                                </button>
                            )}
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white shadow-lg"><Icon name="Zap" className="w-5 h-5 fill-current" /></div>
                                <h1 className="text-lg font-black italic uppercase text-slate-900">ScoreLog</h1>
                            </div>
                        </div>
                        <div className="flex gap-1 items-center bg-slate-50 p-1 rounded-full border border-slate-100">
                            <button onClick={() => setShowMemberEditor(true)} className="p-2 text-slate-400 hover:text-emerald-500 transition-colors"><Icon name="Settings" className="w-4 h-4"/></button>
                            <button onClick={() => { setModalSetup({ ...modalSetup, selectedIds: db.members.slice(0,4).map(m => m.id) }); setShowNewSetModal(true); }} className="bg-emerald-500 text-white p-2 rounded-full shadow-md"><Icon name="Plus" className="w-4 h-4" /></button>
                        </div>
                    </header>

                    <main className={`flex-1 overflow-y-auto no-scrollbar pb-32 ${activeField ? 'pointer-events-none opacity-50' : ''}`}>
                        {activeTab === 'welcome' && (
                            <div className="flex flex-col items-center justify-center py-24 px-10 text-center space-y-8 animate-in">
                                <div className="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-[32px] flex items-center justify-center rotate-3"><Icon name="BarChart3" className="w-12 h-12" /></div>
                                <div className="space-y-2">
                                    <h2 className="text-2xl font-black text-slate-900">対戦履歴と実力を可視化。</h2>
                                    <p className="text-sm text-slate-400 font-medium">チップ換算・共有レポート作成<br/>機能を搭載したプロモデルです。</p>
                                </div>
                                <button onClick={() => setShowNewSetModal(true)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-2xl active:scale-95 transition-transform">新規対局を開始する</button>
                            </div>
                        )}

                        {(activeTab === 'input' || viewingRecordIndex !== null) && (viewingRecord || db.currentSet) && (
                            <div className="animate-in">
                                {viewingRecord && (
                                    <div className="bg-emerald-500 p-2 flex justify-between items-center px-4">
                                        <div className="text-white text-[10px] font-black italic uppercase tracking-[0.2em] flex items-center gap-2">
                                            <Icon name="Edit" className="w-3 h-3" /> Editing Archive
                                        </div>
                                        <button onClick={generateShareImage} className="text-white text-[10px] font-black flex items-center gap-1 uppercase bg-white/20 px-3 py-1 rounded-full">
                                            <Icon name="Share2" className="w-3 h-3" /> Report Image
                                        </button>
                                    </div>
                                )}
                                <div className="overflow-x-auto no-scrollbar">
                                    <table className="w-full border-collapse table-fixed min-w-[360px] text-center">
                                        <thead>
                                            <tr className="bg-slate-50 text-[10px] font-black text-slate-400 italic uppercase">
                                                <th className="w-14 py-4 sticky left-0 bg-slate-50 z-10 border-r border-slate-100">Round</th>
                                                {(viewingRecord || db.currentSet).players.map((p, i) => <th key={i} className="py-4 truncate px-2 text-slate-600 border-l border-white">{p.name}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white">
                                            {(viewingRecord || db.currentSet).players[0].scores.map((_, ri) => (
                                                <tr key={ri} className="border-b border-slate-50">
                                                    <td className="sticky left-0 bg-white z-10 py-5 text-xs font-black text-slate-300 border-r border-slate-50">{ri + 1}</td>
                                                    {(viewingRecord || db.currentSet).players.map((p, pi) => (
                                                        <td key={pi} onClick={() => (setActiveField({type:'score', ri, pi}), setTempValue(String(p.scores[ri] || 0)))} className={`p-1 cursor-pointer transition-colors ${activeField?.type === 'score' && activeField.ri === ri && activeField.pi === pi ? 'bg-emerald-50 ring-2 ring-emerald-500 ring-inset z-20' : ''}`}>
                                                            <div className={`text-xl font-black tracking-tight ${p.scores[ri] > 0 ? 'text-emerald-600' : p.scores[ri] < 0 ? 'text-rose-500' : 'text-slate-200'}`}>{p.scores[ri] || 0}</div>
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                            <tr className="bg-slate-100/50">
                                                <td className="sticky left-0 bg-slate-100/50 z-10 py-4 text-[10px] font-black text-slate-400 border-r border-slate-200 uppercase tracking-wider">Score</td>
                                                {currentPlayersData.map((p, pi) => <td key={pi} className="p-1"><div className={`text-sm font-black ${p.scoreTotal >= 0 ? 'text-emerald-700' : 'text-rose-700'}`}>{p.scoreTotal.toFixed(1)}</div></td>)}
                                            </tr>
                                            <tr className="bg-orange-50/20">
                                                <td className="sticky left-0 bg-white z-10 py-4 text-[10px] font-black text-orange-400 border-r border-slate-50 uppercase tracking-wider">Chips</td>
                                                {(viewingRecord || db.currentSet).players.map((p, pi) => (
                                                    <td key={pi} onClick={() => (setActiveField({type:'chip', pi}), setTempValue(String(p.chip || 0)))} className={`p-1 cursor-pointer transition-colors ${activeField?.type === 'chip' && activeField.pi === pi ? 'bg-orange-100 ring-2 ring-orange-400' : ''}`}>
                                                        <div className="text-sm font-black text-orange-600">{p.chip || 0}</div>
                                                    </td>
                                                ))}
                                            </tr>
                                            <tr className="bg-slate-50/50">
                                                <td className="sticky left-0 bg-white z-10 py-4 text-[10px] font-black text-slate-300 border-r border-slate-50 uppercase tracking-wider">Fee</td>
                                                {(viewingRecord || db.currentSet).players.map((p, pi) => (
                                                    <td key={pi} onClick={() => (setActiveField({type:'fee', pi}), setTempValue(String(p.fee || 0)))} className={`p-1 cursor-pointer transition-colors ${activeField?.type === 'fee' && activeField.pi === pi ? 'bg-slate-200 ring-2 ring-slate-400' : ''}`}>
                                                        <div className="text-[11px] font-black text-slate-500">{p.fee || 0}</div>
                                                    </td>
                                                ))}
                                            </tr>
                                        </tbody>
                                        <tfoot className="bg-slate-900 text-white">
                                            <tr>
                                                <td className="sticky left-0 bg-slate-900 py-6 text-[10px] italic border-r border-white/10 uppercase opacity-40">Net</td>
                                                {currentPlayersData.map((p, i) => <td key={i} className={`py-6 text-base font-black ${p.income >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{Math.round(p.income).toLocaleString()}</td>)}
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                                {!viewingRecord && (
                                    <div className="p-5 space-y-4">
                                        <button onClick={() => { const n = JSON.parse(JSON.stringify(db)); n.currentSet.players.forEach(p => p.scores.push(0)); setDb(n); }} className="w-full py-4 bg-white border border-slate-200 rounded-2xl text-slate-500 font-bold flex items-center justify-center gap-2">
                                            <Icon name="Plus" className="w-4 h-4" /> 半荘追加
                                        </button>
                                        <button onClick={() => { 
                                            const stats = calcPlayerStats(db.currentSet);
                                            const r = JSON.parse(JSON.stringify(db.currentSet)); 
                                            r.players = stats.map(p => ({ 
                                                name: p.name, scores: p.scores, chip: p.chip, fee: p.fee, settlement: p.income, scoreTotal: p.scoreTotal
                                            })); 
                                            setDb({ ...db, history: [r, ...db.history], currentSet: null }); 
                                            setActiveTab('history'); 
                                        }} className="w-full py-5 bg-emerald-500 text-white rounded-[24px] font-black text-lg shadow-xl active:scale-95 transition-transform">対局を確定保存</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="p-6 space-y-6 animate-in pb-32">
                                <h2 className="text-2xl font-black italic uppercase flex items-center gap-2"><Icon name="Activity" className="text-emerald-500" />統計レポート</h2>
                                <div className="bg-white border border-slate-100 p-4 rounded-[24px] shadow-sm">
                                    <div className="flex gap-2 items-center">
                                        <input type="date" value={statStartDate} onChange={(e) => setStatStartDate(e.target.value)} className="flex-1" />
                                        <span className="text-slate-300 text-xs">〜</span>
                                        <input type="date" value={statEndDate} onChange={(e) => setStatEndDate(e.target.value)} className="flex-1" />
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <span className="text-[10px] font-black text-slate-300 uppercase">表示プレイヤー選択</span>
                                    <div className="flex flex-wrap gap-2">
                                        {Object.keys(stats).map(name => (
                                            <button key={name} onClick={() => setStatSelectedNames(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name])} 
                                                className={`px-4 py-2 rounded-full border text-[11px] font-black transition-all ${statSelectedNames.includes(name) ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-400 border-slate-100'}`}>
                                                {name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex bg-slate-100 p-1 rounded-2xl text-[10px] font-black gap-1">
                                    {[{id:'income', l:'累積収支'}, {id:'scoreWithChip', l:'累積スコア(チップ込)'}].map(t => (
                                        <button key={t.id} onClick={() => setStatType(t.id)} className={`flex-1 py-2 rounded-xl transition-all ${statType === t.id ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}>{t.l}</button>
                                    ))}
                                </div>
                                <div className="bg-white border border-slate-100 rounded-[32px] p-6 shadow-sm h-64 relative"><canvas ref={chartRef}></canvas></div>
                                <div className="space-y-3">
                                    <div className="grid grid-cols-2 gap-2">
                                        {[{id:'topRate', l:'トップ率'}, {id:'secondRate', l:'連対率'}, {id:'lastRate', l:'ラス率'}, {id:'avgRank', l:'平均着順'}].map(t => (
                                            <button key={t.id} onClick={() => setStatType(t.id)} className={`py-3 rounded-2xl text-[10px] font-black transition-all ${statType === t.id ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-400'}`}>{t.l}</button>
                                        ))}
                                    </div>
                                    {sortedStatNames.map((name, idx) => {
                                        const s = stats[name];
                                        const getRate = (r) => (s.ranks.filter(x => x === r).length / s.games * 100 || 0).toFixed(1) + '%';
                                        const getValue = () => {
                                            switch(statType) {
                                                case 'income': return Math.round(s.income).toLocaleString() + '円';
                                                case 'scoreWithChip': return (parseFloat(s.scoreWithChip) || 0).toFixed(1) + 'pt';
                                                case 'topRate': return getRate(1);
                                                case 'secondRate': return ((s.ranks.filter(x => x <= 2).length / s.games * 100) || 0).toFixed(1) + '%';
                                                case 'lastRate': return getRate(4);
                                                case 'avgRank': return (s.ranks.reduce((p, c) => p + c, 0) / s.games || 0).toFixed(2) + '位';
                                                default: return "0";
                                            }
                                        };
                                        return (
                                            <div key={name} className="bg-white p-5 rounded-[28px] border border-slate-100 flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-xl flex items-center justify-center font-black text-white text-xs" style={{backgroundColor: colors[Object.keys(stats).indexOf(name) % colors.length]}}>{idx + 1}</div>
                                                    <div><div className="font-black text-slate-800 text-sm">{name}</div><div className="text-[9px] text-slate-300 font-bold uppercase">{s.games} GAMES</div></div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-lg font-black italic tracking-tighter text-slate-900">{getValue()}</div>
                                                    <div className="text-[9px] text-slate-300 font-black uppercase">TOTAL STAT</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'analysis' && (
                            <div className="p-6 space-y-6 animate-in">
                                <h2 className="text-2xl font-black italic flex items-center gap-2"><Icon name="Swords" className="text-rose-500" />相性分析</h2>
                                <div className="bg-slate-100/50 p-2 rounded-[24px] flex flex-wrap gap-2">
                                    {db.members.map(m => (
                                        <button key={m.id} onClick={() => setSelectedAnalysisMembers(prev => prev.includes(m.name) ? prev.filter(n => n !== m.name) : [...prev, m.name].slice(-4))} className={`px-4 py-2 rounded-full border text-xs font-black transition-all ${selectedAnalysisMembers.includes(m.name) ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-400 border-slate-200'}`}>{m.name}</button>
                                    ))}
                                </div>
                                {selectedAnalysisMembers.map(target => (
                                    <div key={target} className="mt-8">
                                        <div className="text-[10px] font-black text-rose-500 italic bg-rose-50 px-3 py-1 rounded-full mb-4 border border-rose-100 uppercase">{target} VS OTHERS</div>
                                        <div className="grid gap-3">
                                            {selectedAnalysisMembers.filter(n => n !== target).map(otherName => {
                                                let incomeDiff = 0, scoreDiff = 0, matchCount = 0;
                                                db.history.forEach(h => {
                                                    const pT = h.players.find(p => p.name === target);
                                                    const pO = h.players.find(p => p.name === otherName);
                                                    if (pT && pO) {
                                                        const rate = parseFloat(h.rate) || 0, chipRate = parseFloat(h.chipRate) || 0;
                                                        const pTStats = calcPlayerStats(h).find(s => s.name === target);
                                                        const pOStats = calcPlayerStats(h).find(s => s.name === otherName);
                                                        
                                                        incomeDiff += (pTStats.income - pOStats.income);
                                                        const totalT = pTStats.scoreTotal + getChipPoints(pTStats.chip, rate, chipRate);
                                                        const totalO = pOStats.scoreTotal + getChipPoints(pOStats.chip, rate, chipRate);
                                                        scoreDiff += (totalT - totalO);
                                                        matchCount++;
                                                    }
                                                });
                                                return (
                                                    <div key={otherName} className="bg-white p-5 rounded-[24px] border border-slate-100 flex justify-between items-center shadow-sm">
                                                        <div><div className="font-black text-slate-700">{otherName}</div><div className="text-[9px] text-slate-300 font-bold uppercase">{matchCount} MATCHES</div></div>
                                                        <div className="text-right">
                                                            <div className={`text-lg font-black italic ${incomeDiff >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{incomeDiff >= 0 ? '+' : ''}{Math.round(incomeDiff).toLocaleString()}円</div>
                                                            <div className="text-[10px] font-bold text-slate-400">{scoreDiff >= 0 ? '+' : ''}{(parseFloat(scoreDiff) || 0).toFixed(1)}pt</div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'history' && viewingRecordIndex === null && (
                            <div className="p-6 space-y-4 animate-in">
                                <div className="flex justify-between items-center"><h2 className="text-2xl font-black italic flex items-center gap-2"><Icon name="History" className="text-emerald-500" />アーカイブ</h2><div className="text-[10px] font-black text-slate-300 uppercase">{db.history.length} RECORDS</div></div>
                                {db.history.map((h, i) => (
                                    <div key={i} className="group relative">
                                        <div onClick={() => { setViewingRecordIndex(i); }} className="bg-white p-5 rounded-[28px] border border-slate-100 shadow-sm flex justify-between items-center active:scale-95 transition-all">
                                            <div className="space-y-1">
                                                <div className="text-[10px] font-black text-slate-300 uppercase">{h.date.split('T')[0]}</div>
                                                <div className="flex gap-1 text-xs font-black text-slate-600">{h.players.slice(0, 4).map((p, pi) => <span key={pi}>{p.name}{pi < 3 ? '・' : ''}</span>)}</div>
                                            </div>
                                            <Icon name="ChevronRight" className="text-slate-300" />
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); if(confirm("削除しますか？")) { const newH = [...db.history]; newH.splice(i,1); setDb({...db, history:newH}); } }} className="absolute -top-2 -right-2 w-8 h-8 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-lg transform scale-0 group-hover:scale-100 transition-transform z-10"><Icon name="Trash2" className="w-4 h-4" /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto glass-panel border-t border-slate-100 px-6 py-4 flex justify-between items-center z-40">
                        {[{id:'input', icon:'LayoutGrid', l:'Score'}, {id:'history', icon:'History', l:'Archive'}, {id:'stats', icon:'Activity', l:'Stats'}, {id:'analysis', icon:'Swords', l:'VS'}].map(t => (
                            <button key={t.id} onClick={() => { setViewingRecordIndex(null); setActiveTab(t.id); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === t.id && viewingRecordIndex === null ? 'text-emerald-500 scale-110' : 'text-slate-300'}`}><Icon name={t.icon} className="w-6 h-6" /><span className="text-[9px] font-black uppercase">{t.l}</span></button>
                        ))}
                    </nav>

                    {activeField && (
                        <div className="fixed inset-0 z-[100] flex flex-col justify-end">
                            <div className="absolute inset-0 bg-slate-900/20 backdrop-blur-[2px]" onClick={applyValue}></div>
                            <div className="relative bg-white rounded-t-[32px] p-6 pb-12 shadow-2xl animate-in max-w-[450px] mx-auto w-full">
                                <div className="flex justify-between items-center mb-6"><div className="flex flex-col"><span className="text-[10px] font-black text-slate-300 uppercase">数値入力</span><span className="text-2xl font-black italic text-emerald-500">{tempValue || "0"}<span className="animate-pulse">|</span></span></div></div>
                                <div className="grid grid-cols-4 gap-2">
                                    {[1,2,3,'DEL', 4,5,6,'+/-', 7,8,9,'00', 'CLEAR',0,'.','DONE'].map((k, i) => (
                                        <button key={i} onClick={() => handleKeyClick(k)} className={`key-btn ${k === 'DONE' ? 'key-btn-dark' : ''} ${k === 'CLEAR' || k === 'DEL' ? 'text-rose-500' : ''}`}>{k === 'DEL' ? <Icon name="Backspace" /> : k === 'DONE' ? <Icon name="Check" /> : k}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showMemberEditor && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-end justify-center animate-in">
                            <div className="bg-white w-full max-w-[450px] rounded-t-[40px] h-[80vh] flex flex-col p-8">
                                <div className="flex justify-between items-center mb-8"><h3 className="text-2xl font-black italic">設定</h3><button onClick={() => setShowMemberEditor(false)} className="bg-slate-100 p-2 rounded-full"><Icon name="X" /></button></div>
                                <div className="space-y-8 overflow-y-auto no-scrollbar">
                                    <div className="space-y-4">
                                        <span className="text-[10px] font-black text-slate-300 uppercase">メンバー編集</span>
                                        {db.members.map(m => (
                                            <div key={m.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100"><span className="font-bold">{m.name}</span><button onClick={() => setDb({...db, members: db.members.filter(mem => mem.id !== m.id)})} className="p-2 text-rose-300"><Icon name="Trash2" className="w-4 h-4" /></button></div>
                                        ))}
                                        <button onClick={() => {const n = prompt("名前を入力"); if(n) setDb({...db, members:[...db.members, {id:Date.now(), name:n}]})}} className="w-full py-4 border-2 border-dashed border-slate-100 rounded-2xl text-slate-400 font-bold">+ 追加</button>
                                    </div>
                                    <div className="space-y-4">
                                        <span className="text-[10px] font-black text-slate-300 uppercase">バックアップ</span>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => { const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; link.download = "scorelog_v9_6.json"; link.click(); }} className="bg-slate-900 text-white p-4 rounded-2xl flex flex-col items-center gap-2"><Icon name="Download" />保存</button>
                                            <button onClick={() => setIsEditingBackup(true)} className="bg-white border border-slate-200 text-slate-600 p-4 rounded-2xl flex flex-col items-center gap-2"><Icon name="Edit3" />直接編集</button>
                                        </div>
                                        {isEditingBackup && (
                                            <div className="space-y-3">
                                                <textarea value={backupText} onChange={(e) => setBackupText(e.target.value)} className="w-full h-48 p-4 bg-slate-50 border rounded-2xl font-mono text-[10px]" placeholder="JSONデータを貼り付け" />
                                                <button onClick={() => { try { setDb(JSON.parse(backupText)); setIsEditingBackup(false); } catch(e) { alert("Invalid JSON"); } }} className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black">適用</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showNewSetModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-end justify-center animate-in">
                            <div className="bg-white w-full max-w-[450px] rounded-t-[40px] p-8">
                                <h3 className="text-2xl font-black italic mb-6">対局セットアップ</h3>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-2">
                                        {db.members.map(m => (
                                            <button key={m.id} onClick={() => setModalSetup({ ...modalSetup, selectedIds: modalSetup.selectedIds.includes(m.id) ? modalSetup.selectedIds.filter(id => id !== m.id) : [...modalSetup.selectedIds, m.id].slice(-4) })}
                                                className={`p-4 rounded-2xl border-2 text-sm font-black transition-all ${modalSetup.selectedIds.includes(m.id) ? 'border-emerald-500 bg-emerald-50 text-emerald-600' : 'border-slate-50 text-slate-300'}`}>
                                                {m.name}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-300 uppercase">レート(円)</label><input type="number" value={modalSetup.rate} onChange={e => setModalSetup({...modalSetup, rate:parseFloat(e.target.value) || 0})} className="w-full bg-slate-50 p-4 rounded-2xl border-none font-black" /></div>
                                        <div><label className="text-[10px] font-black text-slate-300 uppercase">チップ(円)</label><input type="number" value={modalSetup.chipRate} onChange={e => setModalSetup({...modalSetup, chipRate:parseFloat(e.target.value) || 0})} className="w-full bg-slate-50 p-4 rounded-2xl border-none font-black" /></div>
                                    </div>
                                    <button disabled={modalSetup.selectedIds.length !== 4} onClick={() => {
                                        const m = modalSetup.selectedIds.map(id => db.members.find(x => x.id === id));
                                        setDb({...db, currentSet: { date: new Date().toISOString(), rate: modalSetup.rate, chipRate: modalSetup.chipRate, players: m.map(x => ({name: x.name, scores:[0], chip:0, fee:0})) }});
                                        setShowNewSetModal(false); setActiveTab('input');
                                    }} className="w-full py-5 bg-emerald-500 text-white rounded-[24px] font-black text-lg disabled:opacity-30">対局開始</button>
                                    <button onClick={() => setShowNewSetModal(false)} className="w-full text-slate-400 font-bold">キャンセル</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
