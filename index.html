<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ScoreLog Pro AI - 麻雀成績管理</title>
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --app-max-width: 450px;
        }

        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif; 
            background-color: #f8fafc;
            overscroll-behavior-y: contain;
            margin: 0;
            padding: 0;
        }

        .app-container {
            max-width: var(--app-max-width);
            margin: 0 auto;
            min-height: 100vh;
            background: #ffffff;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        * { -webkit-tap-highlight-color: transparent; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* フォーム要素のフォーカスリング調整 */
        input:focus { outline: none; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const STORAGE_KEY = 'scorelog_v40_stable';

        /**
         * Lucideアイコンコンポーネント (エラー回避版)
         * Reactの仮想DOMとLucideのDOM操作が干渉しないよう、
         * iconコンテナを個別に管理します。
         */
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // 既存のアイコンをクリアしてから再作成することで不整合を防ぐ
                    iconRef.current.innerHTML = ''; 
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2'));
                    iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        root: iconRef.current
                    });
                }
            }, [name, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" {...props}></span>;
        };

        const App = () => {
            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {
                    members: [
                        { id: 1, name: 'プレイヤー1' }, { id: 2, name: 'プレイヤー2' }, 
                        { id: 3, name: 'プレイヤー3' }, { id: 4, name: 'プレイヤー4' }
                    ],
                    history: [],
                    currentSet: null
                };
            });

            const [activeTab, setActiveTab] = useState('welcome');
            const [activeField, setActiveField] = useState(null); 
            const [currentValue, setCurrentValue] = useState("0");
            const [viewingRecord, setViewingRecord] = useState(null);
            
            const [statStartDate, setStatStartDate] = useState("");
            const [statEndDate, setStatEndDate] = useState("");
            const [statSelectedNames, setStatSelectedNames] = useState([]);
            const [statType, setStatType] = useState('income'); 

            const [selectedAnalysisMembers, setSelectedAnalysisMembers] = useState([]);
            const [showJsonEditor, setShowJsonEditor] = useState(false);
            const [jsonInput, setJsonInput] = useState("");
            const [showNewSetModal, setShowNewSetModal] = useState(false);
            const [modalSetup, setModalSetup] = useState({ rate: 50, chipRate: 100, selectedIds: [] });
            
            const chartRef = useRef(null);
            const trendChartInstance = useRef(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
                if (db.currentSet && activeTab === 'welcome') setActiveTab('input');
            }, [db, activeTab]);

            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];

            const currentData = viewingRecord || db.currentSet;

            const calculatedPlayers = useMemo(() => {
                if (!currentData) return [];
                return currentData.players.map(p => {
                    const scoreTotal = p.scores.reduce((a, b) => a + (Number(b) || 0), 0);
                    const income = (scoreTotal * currentData.rate) + ((p.chip || 0) * currentData.chipRate) - (p.fee || 0);
                    return { ...p, scoreTotal, income };
                });
            }, [currentData]);

            const stats = useMemo(() => {
                const res = {};
                db.history.forEach(h => {
                    const hDate = h.date.split('T')[0];
                    if (statStartDate && hDate < statStartDate) return;
                    if (statEndDate && hDate > statEndDate) return;
                    const gameCount = h.players[0].scores.length;
                    h.players.forEach(p => {
                        if (!res[p.name]) res[p.name] = { income: 0, scorePure: 0, scoreWithChip: 0, ranks: [], games: 0, history: [] };
                        const s = res[p.name];
                        s.income += (p.settlement || 0) + (p.fee || 0);
                        s.games += gameCount;
                        p.scores.forEach((score, idx) => {
                            const others = h.players.map(op => op.scores[idx]);
                            const rank = others.filter(os => os > score).length + 1;
                            s.ranks.push(rank);
                            s.scorePure += score;
                            const chipScore = (p.chip || 0) * (h.chipRate / h.rate) / gameCount;
                            s.scoreWithChip += (score + chipScore);
                        });
                        s.history.push({ date: h.date, income: (p.settlement + p.fee), score: p.scoreTotal });
                    });
                });
                return res;
            }, [db.history, statStartDate, statEndDate]);

            useEffect(() => {
                if (activeTab === 'stats' && chartRef.current) {
                    if (trendChartInstance.current) trendChartInstance.current.destroy();
                    const allAvailableNames = Object.keys(stats);
                    const targetNames = statSelectedNames.length > 0 ? statSelectedNames.filter(n => allAvailableNames.includes(n)) : allAvailableNames;
                    
                    const datasets = targetNames.map((name, i) => {
                        let bal = 0;
                        const history = stats[name]?.history || [];
                        const d = [0, ...history.map(h => { 
                            if (statType === 'income') bal += h.income;
                            else bal += h.score;
                            return bal;
                        })];
                        return { 
                            label: name, 
                            data: d, 
                            borderColor: colors[i % colors.length], 
                            borderWidth: 4, 
                            tension: 0.4, 
                            pointRadius: 0, 
                            capBezierPoints: true 
                        };
                    });

                    const ctx = chartRef.current.getContext('2d');
                    trendChartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels: Array(Math.max(...datasets.map(d => d.data.length), 1)).fill(''), datasets },
                        options: { 
                            plugins: { legend: { display: false } }, 
                            scales: { 
                                x: { display: false }, 
                                y: { grid: { color: '#f1f5f9', drawBorder: false }, ticks: { font: { weight: 'bold' } } } 
                            }, 
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' }
                        }
                    });
                }
            }, [activeTab, stats, statSelectedNames, statType]);

            const keyPress = (k) => {
                if (!activeField) return;
                let next = currentValue;
                if (k === 'back') next = next.length > 1 ? next.slice(0, -1) : "0";
                else if (k === 'clear') next = "0";
                else if (k === '-') next = next.startsWith('-') ? next.slice(1) : (next === "0" ? "-" : "-" + next);
                else if (k === '.') { if (!next.includes('.')) next += '.'; }
                else next = (next === "0") ? k : next + k;
                
                setCurrentValue(next);
                
                const num = parseFloat(next) || 0;
                const { type, ri, pi } = activeField;
                const newDb = JSON.parse(JSON.stringify(db)); // Deep copy for stability
                
                if (type === 'score') newDb.currentSet.players[pi].scores[ri] = num;
                else if (type === 'chip') newDb.currentSet.players[pi].chip = num;
                else if (type === 'fee') newDb.currentSet.players[pi].fee = num;
                
                setDb(newDb);
            };

            const copyJsonToClipboard = () => {
                const text = JSON.stringify(db, null, 2);
                const dummy = document.createElement("textarea");
                document.body.appendChild(dummy);
                dummy.value = text;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
            };

            return (
                <div className="app-container">
                    <header className="p-4 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                                <Icon name="Zap" className="w-5 h-5 fill-current" />
                            </div>
                            <h1 className="text-lg font-black tracking-tighter italic uppercase text-slate-900">ScoreLog AI</h1>
                        </div>
                        <div className="flex gap-1 items-center bg-slate-50 p-1 rounded-full border border-slate-100">
                            <button onClick={() => { setJsonInput(JSON.stringify(db, null, 2)); setShowJsonEditor(true); }} className="p-2 text-slate-400 hover:text-emerald-500 transition-colors"><Icon name="Settings" className="w-4 h-4"/></button>
                            <button onClick={() => setShowNewSetModal(true)} className="bg-emerald-500 text-white p-2 rounded-full shadow-md active:scale-95 transition-transform"><Icon name="Plus" className="w-4 h-4" /></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar pb-32">
                        {activeTab === 'welcome' && (
                            <div className="flex flex-col items-center justify-center py-24 px-10 text-center space-y-8 animate-in">
                                <div className="relative">
                                    <div className="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-[32px] flex items-center justify-center rotate-3"><Icon name="Gamepad2" className="w-12 h-12" /></div>
                                    <div className="absolute -bottom-2 -right-2 w-10 h-10 bg-white shadow-xl rounded-full flex items-center justify-center text-emerald-500 border border-slate-50"><Icon name="Trophy" className="w-5 h-5" /></div>
                                </div>
                                <div className="space-y-2">
                                    <h2 className="text-2xl font-black text-slate-900">最高の対局記録を。</h2>
                                    <p className="text-sm text-slate-400 font-medium leading-relaxed">リアルタイム計算、詳細な統計、<br/>そして美しいUIをその手に。</p>
                                </div>
                                <button onClick={() => setShowNewSetModal(true)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-2xl shadow-slate-200 active:scale-95 transition-transform">新規対局を開始する</button>
                            </div>
                        )}

                        {activeTab === 'input' && currentData && (
                            <div className="animate-in">
                                {viewingRecord && <div className="bg-slate-900 p-2 text-white text-center text-[10px] font-black italic uppercase tracking-[0.2em]">Viewing History Mode</div>}
                                <div className="overflow-x-auto no-scrollbar">
                                    <table className="w-full border-collapse table-fixed min-w-[360px] text-center">
                                        <thead>
                                            <tr className="bg-slate-50 text-[10px] font-black text-slate-400 italic uppercase tracking-wider">
                                                <th className="w-14 py-4 sticky left-0 bg-slate-50 z-10 border-r border-slate-100">Round</th>
                                                {currentData.players.map((p, i) => <th key={i} className="py-4 truncate px-2 text-slate-600 border-l border-white">{p.name}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white">
                                            {currentData.players[0].scores.map((_, ri) => (
                                                <tr key={ri} className="border-b border-slate-50 group">
                                                    <td className="sticky left-0 bg-white z-10 py-5 text-xs font-black text-slate-300 border-r border-slate-50 group-hover:text-emerald-500 transition-colors">{ri + 1}</td>
                                                    {currentData.players.map((p, pi) => (
                                                        <td key={pi} onClick={() => !viewingRecord && (setActiveField({type:'score', ri, pi}), setCurrentValue(String(p.scores[ri])))} className={`p-1 cursor-pointer transition-all ${activeField?.type === 'score' && activeField.ri === ri && activeField.pi === pi ? 'bg-emerald-50 ring-2 ring-emerald-500 ring-inset z-20' : 'hover:bg-slate-50'}`}>
                                                            <div className={`text-xl font-black tracking-tight ${p.scores[ri] > 0 ? 'text-emerald-600' : p.scores[ri] < 0 ? 'text-rose-500' : 'text-slate-200'}`}>{p.scores[ri]}</div>
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                            <tr className="bg-orange-50/20">
                                                <td className="sticky left-0 bg-white z-10 py-4 text-[10px] font-black text-orange-400 border-r border-slate-50 italic uppercase tracking-wider">Chips</td>
                                                {currentData.players.map((p, pi) => (
                                                    <td key={pi} onClick={() => !viewingRecord && (setActiveField({type:'chip', pi}), setCurrentValue(String(p.chip || 0)))} className={`p-1 cursor-pointer ${activeField?.type === 'chip' && activeField.pi === pi ? 'bg-orange-100 ring-2 ring-orange-400 ring-inset' : ''}`}>
                                                        <div className="text-sm font-black text-orange-600 tabular-nums">{p.chip || 0}枚</div>
                                                    </td>
                                                ))}
                                            </tr>
                                            <tr className="bg-slate-50/50">
                                                <td className="sticky left-0 bg-white z-10 py-4 text-[10px] font-black text-slate-300 border-r border-slate-50 italic uppercase tracking-wider">Fee</td>
                                                {currentData.players.map((p, pi) => (
                                                    <td key={pi} onClick={() => !viewingRecord && (setActiveField({type:'fee', pi}), setCurrentValue(String(p.fee || 0)))} className={`p-1 cursor-pointer ${activeField?.type === 'fee' && activeField.pi === pi ? 'bg-slate-200 ring-2 ring-slate-400 ring-inset' : ''}`}>
                                                        <div className="text-[11px] font-black text-slate-500 tabular-nums">{p.fee || 0}</div>
                                                    </td>
                                                ))}
                                            </tr>
                                        </tbody>
                                        <tfoot className="bg-slate-900 text-white shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
                                            <tr className="text-[10px] font-bold border-b border-white/5">
                                                <td className="sticky left-0 bg-slate-900 py-3 italic border-r border-white/10 uppercase opacity-40">Score</td>
                                                {calculatedPlayers.map((p, i) => <td key={i} className="py-3 font-mono">{p.scoreTotal.toFixed(1)}</td>)}
                                            </tr>
                                            <tr>
                                                <td className="sticky left-0 bg-slate-900 py-6 text-[10px] italic border-r border-white/10 uppercase tracking-[0.2em] opacity-40">Net</td>
                                                {calculatedPlayers.map((p, i) => <td key={i} className={`py-6 text-base font-black ${p.income >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{Math.round(p.income).toLocaleString()}</td>)}
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                                {!viewingRecord && (
                                    <div className="p-5 space-y-4">
                                        <button onClick={() => { const n = JSON.parse(JSON.stringify(db)); n.currentSet.players.forEach(p => p.scores.push(0)); setDb(n); }} className="w-full py-4 bg-white border border-slate-200 rounded-2xl text-slate-500 font-bold hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                                            <Icon name="Plus" className="w-4 h-4" /> 半荘追加
                                        </button>
                                        <button onClick={() => { 
                                            const r = JSON.parse(JSON.stringify(db.currentSet)); 
                                            r.players = calculatedPlayers.map(p => ({ ...p, settlement: p.income })); 
                                            setDb({ ...db, history: [r, ...db.history], currentSet: null }); 
                                            setActiveTab('history'); 
                                        }} className="w-full py-5 bg-emerald-500 text-white rounded-[24px] font-black text-lg shadow-xl shadow-emerald-100 italic active:scale-95 transition-transform">対局を保存・精算確定</button>
                                    </div>
                                )}
                                {viewingRecord && <div className="p-5"><button onClick={() => { setViewingRecord(null); setActiveTab('history'); }} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-2"><Icon name="ArrowLeft" /> 履歴リストへ戻る</button></div>}
                            </div>
                        )}

                        {activeTab === 'analysis' && (
                            <div className="p-6 space-y-6 animate-in">
                                <h2 className="text-2xl font-black italic flex items-center gap-2">
                                    <Icon name="Swords" className="text-rose-500" />
                                    相性分析
                                </h2>
                                <div className="bg-slate-100/50 p-2 rounded-[24px] flex flex-wrap gap-2">
                                    {db.members.map(m => (
                                        <button key={m.id} onClick={() => setSelectedAnalysisMembers(prev => prev.includes(m.name) ? prev.filter(n => n !== m.name) : [...prev, m.name].slice(-4))} className={`px-4 py-2 rounded-full border text-xs font-black transition-all ${selectedAnalysisMembers.includes(m.name) ? 'bg-slate-900 text-white border-slate-900 shadow-lg' : 'bg-white text-slate-400 border-slate-200'}`}>{m.name}</button>
                                    ))}
                                </div>
                                {selectedAnalysisMembers.length === 0 && <div className="py-20 text-center text-slate-300 font-black text-sm uppercase italic">Select players to analyze</div>}
                                {selectedAnalysisMembers.map(target => (
                                    <div key={target} className="mt-8 animate-in">
                                        <div className="text-[10px] font-black text-rose-500 italic bg-rose-50 px-3 py-1 rounded-full inline-block mb-4 uppercase tracking-widest border border-rose-100">{target} VS others</div>
                                        <div className="grid gap-3">
                                            {selectedAnalysisMembers.filter(n => n !== target).map(name => {
                                                let diffIncome = 0;
                                                db.history.forEach(h => {
                                                    const p1 = h.players.find(p => p.name === target);
                                                    const p2 = h.players.find(p => p.name === name);
                                                    if (p1 && p2) diffIncome += (p1.settlement - p2.settlement);
                                                });
                                                return (
                                                    <div key={name} className="bg-white p-5 rounded-[24px] border border-slate-100 flex justify-between items-center shadow-sm">
                                                        <span className="font-black text-slate-700">{name}</span>
                                                        <div className={`text-xl font-black italic tracking-tighter ${diffIncome >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{diffIncome >= 0 ? '+' : ''}{Math.round(diffIncome).toLocaleString()} <span className="text-[10px] font-bold not-italic ml-0.5">円</span></div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="p-6 space-y-6 animate-in">
                                <h2 className="text-2xl font-black italic uppercase flex items-center gap-2">
                                    <Icon name="Activity" className="text-emerald-500" />
                                    統計レポート
                                </h2>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-3 rounded-[20px] border border-slate-100">
                                        <label className="text-[9px] font-black text-slate-300 block mb-1 uppercase tracking-tighter">From</label>
                                        <input type="date" value={statStartDate} onChange={e => setStatStartDate(e.target.value)} className="w-full text-xs font-black bg-transparent outline-none text-slate-600" />
                                    </div>
                                    <div className="bg-white p-3 rounded-[20px] border border-slate-100">
                                        <label className="text-[9px] font-black text-slate-300 block mb-1 uppercase tracking-tighter">To</label>
                                        <input type="date" value={statEndDate} onChange={e => setStatEndDate(e.target.value)} className="w-full text-xs font-black bg-transparent outline-none text-slate-600" />
                                    </div>
                                </div>

                                <div className="flex bg-slate-100 p-1.5 rounded-2xl text-[10px] font-black overflow-x-auto no-scrollbar gap-1">
                                    {[
                                        {id:'income', l:'収支', icon: 'Coins'}, 
                                        {id:'scorePure', l:'素点', icon: 'Target'}, 
                                        {id:'scoreWithChip', l:'チップ込', icon: 'Sparkles'},
                                        {id:'topRate', l:'1位率', icon: 'Trophy'},
                                        {id:'avgRank', l:'平均順位', icon: 'Hash'}
                                    ].map(t => (
                                        <button key={t.id} onClick={() => setStatType(t.id)} className={`px-4 py-2.5 rounded-xl transition-all flex-shrink-0 flex items-center gap-2 ${statType === t.id ? 'bg-white text-emerald-600 shadow-md' : 'text-slate-400'}`}>
                                            <Icon name={t.icon} className="w-3 h-3" />
                                            {t.l}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="bg-white border border-slate-100 rounded-[32px] p-6 shadow-sm h-64 relative">
                                    <canvas ref={chartRef}></canvas>
                                </div>

                                <div className="space-y-3 mt-4">
                                    {Object.entries(stats)
                                        .filter(([name]) => statSelectedNames.length === 0 || statSelectedNames.includes(name))
                                        .sort((a, b) => {
                                            const valA = statType === 'avgRank' ? (a[1].ranks.reduce((x,y)=>x+y,0)/a[1].ranks.length) : a[1][statType];
                                            const valB = statType === 'avgRank' ? (b[1].ranks.reduce((x,y)=>x+y,0)/b[1].ranks.length) : b[1][statType];
                                            return (statType === 'avgRank' ? 1 : -1) * (valB - valA);
                                        })
                                        .map(([name, s]) => {
                                            const total = s.ranks.length;
                                            const topCount = s.ranks.filter(r => r === 1).length;
                                            const avgRank = s.ranks.reduce((a, b) => a + b, 0) / total;
                                            let displayVal = statType === 'income' ? `${Math.round(s.income).toLocaleString()}円` : statType === 'avgRank' ? `${(avgRank || 0).toFixed(2)}位` : `${(s[statType] || 0).toFixed(1)}pt`;
                                            if (statType === 'topRate') displayVal = `${((topCount/total)*100 || 0).toFixed(1)}%`;

                                            return (
                                                <div key={name} className="bg-white p-5 rounded-[28px] border border-slate-100 flex justify-between items-center shadow-sm hover:border-emerald-200 transition-colors">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-white text-sm" style={{backgroundColor: colors[Object.keys(stats).indexOf(name) % colors.length]}}>
                                                            {name.charAt(0)}
                                                        </div>
                                                        <div>
                                                            <div className="font-black text-slate-800">{name}</div>
                                                            <div className="text-[10px] text-slate-300 font-bold uppercase">{s.games} GAMES</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className={`text-xl font-black italic tracking-tighter ${s.income >= 0 || statType !== 'income' ? 'text-emerald-500' : 'text-rose-500'}`}>{displayVal}</div>
                                                        <div className="text-[9px] text-slate-300 font-black uppercase">Top: {topCount}回</div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    }
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="p-6 space-y-4 animate-in">
                                <h2 className="text-2xl font-black italic flex items-center gap-2">
                                    <Icon name="History" className="text-emerald-500" />
                                    対局アーカイブ
                                </h2>
                                {db.history.length === 0 && <div className="py-24 text-center text-slate-200 font-black italic">NO RECORDS YET</div>}
                                {db.history.map((h, i) => (
                                    <div key={i} onClick={() => { setViewingRecord(h); setActiveTab('input'); }} className="bg-white p-5 rounded-[28px] border border-slate-100 shadow-sm cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all group overflow-hidden relative">
                                        <div className="absolute top-0 left-0 w-1.5 h-full bg-emerald-500/10 group-hover:bg-emerald-500 transition-colors"></div>
                                        <div className="flex justify-between items-center mb-4 text-[10px] font-black italic text-slate-400 uppercase tracking-[0.1em]">
                                            <span>{new Date(h.date).toLocaleDateString('ja-JP')} • {h.players[0].scores.length} ROUNDS</span>
                                            <Icon name="ChevronRight" className="w-4 h-4 text-slate-200 group-hover:text-emerald-500" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {h.players.slice(0, 4).map((p, pi) => (
                                                <div key={pi} className="flex justify-between items-end border-b border-slate-50 pb-2">
                                                    <span className="text-xs font-bold text-slate-500 truncate max-w-[60%]">{p.name}</span>
                                                    <span className={`text-sm font-black ${p.settlement >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{p.settlement > 0 ? '+' : ''}{Math.round(p.settlement).toLocaleString()}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'members' && (
                            <div className="p-6 space-y-6 animate-in">
                                <h2 className="text-2xl font-black italic flex items-center gap-2">
                                    <Icon name="Users" className="text-emerald-500" />
                                    メンバー名簿
                                </h2>
                                <div className="grid gap-3">
                                    {db.members.map(m => (
                                        <div key={m.id} className="bg-white p-5 rounded-[24px] border border-slate-100 flex justify-between items-center shadow-sm group">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300 font-black">{m.name.charAt(0)}</div>
                                                <span className="font-black text-slate-800">{m.name}</span>
                                            </div>
                                            <button onClick={() => { if(confirm("削除しますか？")) setDb({...db, members: db.members.filter(mem => mem.id !== m.id)}); }} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-100 group-hover:text-rose-400 group-hover:bg-rose-50 transition-all"><Icon name="X" className="w-4 h-4" /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { const n = prompt("名前を入力"); if(n) setDb({...db, members: [...db.members, {id: Date.now(), name: n}]}); }} className="w-full py-5 bg-white border-2 border-dashed border-slate-200 rounded-[24px] text-slate-400 font-black hover:text-emerald-500 hover:border-emerald-500 transition-all">+ 新しいメンバーを登録</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto glass-panel border-t border-slate-100 flex justify-around items-center h-20 z-30 pb-safe px-4">
                        {[
                            {id: 'input', icon: 'Gamepad2', label: '対局'},
                            {id: 'analysis', icon: 'Swords', label: '分析'},
                            {id: 'stats', icon: 'BarChart3', label: '統計'},
                            {id: 'history', icon: 'Archive', label: '履歴'},
                            {id: 'members', icon: 'Users', label: '名簿'}
                        ].map(t => (
                            <button key={t.id} onClick={() => { setActiveTab(t.id); setViewingRecord(null); }} className={`flex flex-col items-center flex-1 py-2 transition-all relative ${activeTab === t.id ? 'text-emerald-500' : 'text-slate-300 hover:text-slate-500'}`}>
                                {activeTab === t.id && <div className="absolute -top-0 w-8 h-1 bg-emerald-500 rounded-full animate-in"></div>}
                                <Icon name={t.icon} className={`w-6 h-6 ${activeTab === t.id ? 'fill-emerald-50' : ''}`}/>
                                <span className="text-[10px] font-black mt-1 uppercase tracking-tighter">{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    <div className={`fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto glass-panel p-6 shadow-[0_-20px_40px_rgba(0,0,0,0.08)] z-50 rounded-t-[40px] transition-transform duration-500 cubic-bezier(0.16, 1, 0.3, 1) ${activeField ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="flex justify-between items-center mb-6 px-2">
                            <div className="flex flex-col">
                                <span className="font-black text-slate-300 text-[10px] italic uppercase tracking-[0.2em]">{activeField?.type}</span>
                                <span className="font-black text-slate-900 text-sm">{activeField ? db.currentSet.players[activeField.pi].name : ''}</span>
                            </div>
                            <div className="text-4xl font-black text-emerald-500 tracking-tighter tabular-nums">{currentValue}</div>
                        </div>
                        <div className="grid grid-cols-4 gap-3">
                            {['7','8','9','back','4','5','6','-','1','2','3','clear','0','00','.','done'].map((k) => (
                                <button key={k} onClick={() => k === 'done' ? setActiveField(null) : k === 'back' ? keyPress('back') : k === 'clear' ? keyPress('clear') : keyPress(k)} className={`h-14 rounded-2xl font-black text-xl flex items-center justify-center shadow-sm active:scale-90 transition-transform ${k === 'done' ? 'bg-emerald-500 text-white shadow-emerald-200' : k === 'back' || k === 'clear' ? 'bg-slate-100 text-slate-400' : 'bg-white text-slate-800 border border-slate-50'}`}>
                                    {k === 'back' ? <Icon name="Delete" /> : k === 'done' ? <Icon name="Check" /> : k}
                                </button>
                            ))}
                        </div>
                    </div>

                    {showNewSetModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end sm:items-center justify-center p-0 sm:p-6 animate-in">
                            <div className="bg-white w-full max-w-[400px] rounded-t-[40px] sm:rounded-[48px] p-8 space-y-8 shadow-2xl relative">
                                <div className="w-12 h-1.5 bg-slate-100 rounded-full mx-auto -mt-2 sm:hidden"></div>
                                <div className="text-center space-y-1">
                                    <h3 className="text-2xl font-black italic uppercase tracking-widest">New Game</h3>
                                    <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest">対戦メンバーとレートの設定</p>
                                </div>
                                <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto no-scrollbar p-1">
                                    {db.members.map(m => (
                                        <button key={m.id} onClick={() => setModalSetup(prev => ({...prev, selectedIds: prev.selectedIds.includes(m.id) ? prev.selectedIds.filter(id => id !== m.id) : [...prev.selectedIds, m.id]}))} className={`p-4 rounded-2xl text-xs font-black border-2 transition-all flex items-center justify-between ${modalSetup.selectedIds.includes(m.id) ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg' : 'bg-slate-50 border-transparent text-slate-400'}`}>
                                            {m.name}
                                            {modalSetup.selectedIds.includes(m.id) && <Icon name="CheckCircle2" className="w-4 h-4" />}
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-transparent focus-within:border-emerald-500 transition-colors">
                                        <label className="text-[9px] font-black text-slate-300 uppercase block mb-1">Rate (pt/yen)</label>
                                        <input type="number" value={modalSetup.rate} onChange={e => setModalSetup({...modalSetup, rate: Number(e.target.value)})} className="w-full bg-transparent text-lg font-black outline-none" />
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-transparent focus-within:border-emerald-500 transition-colors">
                                        <label className="text-[9px] font-black text-slate-300 uppercase block mb-1">Chip (yen)</label>
                                        <input type="number" value={modalSetup.chipRate} onChange={e => setModalSetup({...modalSetup, chipRate: Number(e.target.value)})} className="w-full bg-transparent text-lg font-black outline-none" />
                                    </div>
                                </div>
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => setShowNewSetModal(false)} className="flex-1 py-5 bg-slate-100 text-slate-400 rounded-3xl font-black text-sm uppercase">Cancel</button>
                                    <button onClick={() => {
                                        const selected = db.members.filter(m => modalSetup.selectedIds.includes(m.id));
                                        if(selected.length < 3) return;
                                        setDb({...db, currentSet: { date: new Date().toISOString(), rate: modalSetup.rate, chipRate: modalSetup.chipRate, players: selected.map(m => ({ name: m.name, scores: [0], chip: 0, fee: 0 })) }});
                                        setShowNewSetModal(false);
                                        setActiveTab('input');
                                    }} className="flex-[2] py-5 bg-emerald-500 text-white rounded-3xl font-black text-lg italic shadow-xl shadow-emerald-100 active:scale-95 transition-transform uppercase tracking-wider">Start</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showJsonEditor && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[100] p-6 flex flex-col animate-in">
                            <div className="bg-white flex-1 rounded-[40px] p-8 flex flex-col space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black italic uppercase text-lg">Export / Import</h3>
                                    <button onClick={() => setShowJsonEditor(false)} className="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400"><Icon name="X" /></button>
                                </div>
                                <textarea value={jsonInput} onChange={e => setJsonInput(e.target.value)} className="flex-1 bg-slate-50 border border-slate-100 rounded-3xl p-6 font-mono text-[10px] outline-none focus:ring-2 ring-emerald-500 no-scrollbar"></textarea>
                                <div className="flex gap-3">
                                    <button onClick={() => { copyJsonToClipboard(); }} className="flex-1 py-5 bg-slate-100 text-slate-600 rounded-3xl font-black text-xs uppercase">Copy JSON</button>
                                    <button onClick={() => { try { setDb(JSON.parse(jsonInput)); setShowJsonEditor(false); } catch(e) { alert("JSON形式が正しくありません"); } }} className="flex-[2] py-5 bg-slate-900 text-white rounded-3xl font-black text-xs shadow-lg uppercase">Apply Data</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
