<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreLog Pro AI - 麻雀成績管理</title>
    <!-- 外部ライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const STORAGE_KEY = 'scorelog_v40_final';

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name, className]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className} {...props}></i>;
        };

        const App = () => {
            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {
                    members: [
                        { id: 1, name: 'プレイヤー1' }, { id: 2, name: 'プレイヤー2' }, 
                        { id: 3, name: 'プレイヤー3' }, { id: 4, name: 'プレイヤー4' }
                    ],
                    history: [],
                    currentSet: null
                };
            });

            const [activeTab, setActiveTab] = useState('welcome');
            const [activeField, setActiveField] = useState(null); 
            const [currentValue, setCurrentValue] = useState("0");
            const [viewingRecord, setViewingRecord] = useState(null);
            
            const [statStartDate, setStatStartDate] = useState("");
            const [statEndDate, setStatEndDate] = useState("");
            const [statSelectedNames, setStatSelectedNames] = useState([]);
            const [statType, setStatType] = useState('income'); 

            const [selectedAnalysisMembers, setSelectedAnalysisMembers] = useState([]);
            const [showJsonEditor, setShowJsonEditor] = useState(false);
            const [jsonInput, setJsonInput] = useState("");
            const [showNewSetModal, setShowNewSetModal] = useState(false);
            const [modalSetup, setModalSetup] = useState({ rate: 50, chipRate: 100, selectedIds: [] });
            
            const chartRef = useRef(null);
            const trendChartInstance = useRef(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
                if (db.currentSet && activeTab === 'welcome') setActiveTab('input');
            }, [db]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, showNewSetModal, viewingRecord, statType]);

            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];

            const currentData = viewingRecord || db.currentSet;

            // 即時反映ロジック (Web版ブラウザ上でも即座に計算されます)
            const calculatedPlayers = useMemo(() => {
                if (!currentData) return [];
                return currentData.players.map(p => {
                    const scoreTotal = p.scores.reduce((a, b) => a + (Number(b) || 0), 0);
                    const income = (scoreTotal * currentData.rate) + ((p.chip || 0) * currentData.chipRate) - (p.fee || 0);
                    return { ...p, scoreTotal, income };
                });
            }, [currentData]);

            const stats = useMemo(() => {
                const res = {};
                db.history.forEach(h => {
                    const hDate = h.date.split('T')[0];
                    if (statStartDate && hDate < statStartDate) return;
                    if (statEndDate && hDate > statEndDate) return;

                    const gameCount = h.players[0].scores.length;
                    
                    h.players.forEach(p => {
                        if (!res[p.name]) res[p.name] = { 
                            income: 0, 
                            scorePure: 0, 
                            scoreWithChip: 0,
                            ranks: [], 
                            games: 0, 
                            history: [] 
                        };
                        const s = res[p.name];
                        s.income += (p.settlement || 0) + (p.fee || 0);
                        s.games += gameCount;
                        
                        p.scores.forEach((score, idx) => {
                            const others = h.players.map(op => op.scores[idx]);
                            const rank = others.filter(os => os > score).length + 1;
                            s.ranks.push(rank);
                            s.scorePure += score;
                            const chipScore = (p.chip || 0) * (h.chipRate / h.rate) / gameCount;
                            s.scoreWithChip += (score + chipScore);
                        });

                        s.history.push({ date: h.date, income: (p.settlement + p.fee), score: p.scoreTotal });
                    });
                });
                return res;
            }, [db.history, statStartDate, statEndDate]);

            useEffect(() => {
                if (activeTab === 'stats' && chartRef.current) {
                    if (trendChartInstance.current) trendChartInstance.current.destroy();
                    
                    const allAvailableNames = Object.keys(stats);
                    const targetNames = statSelectedNames.length > 0 
                        ? statSelectedNames.filter(n => allAvailableNames.includes(n))
                        : allAvailableNames;

                    const datasets = targetNames.map((name, i) => {
                        let bal = 0;
                        const history = stats[name]?.history || [];
                        const d = [0, ...history.map(h => { 
                            if (statType === 'income') bal += h.income;
                            else bal += h.score;
                            return bal;
                        })];
                        return { 
                            label: name, 
                            data: d, 
                            borderColor: colors[i % colors.length], 
                            borderWidth: 3, 
                            tension: 0.3, 
                            pointRadius: 0 
                        };
                    });

                    trendChartInstance.current = new Chart(chartRef.current, {
                        type: 'line',
                        data: { 
                            labels: Array(Math.max(...datasets.map(d => d.data.length), 1)).fill(''), 
                            datasets 
                        },
                        options: { 
                            plugins: { legend: { display: false } }, 
                            scales: { 
                                x: { display: false }, 
                                y: { grid: { color: '#f1f5f9' } } 
                            }, 
                            maintainAspectRatio: false 
                        }
                    });
                }
            }, [activeTab, stats, statSelectedNames, statType]);

            const keyPress = (k) => {
                if (!activeField) return;
                let next = currentValue;
                if (k === 'back') next = next.length > 1 ? next.slice(0, -1) : "0";
                else if (k === 'clear') next = "0";
                else if (k === '-') next = next.startsWith('-') ? next.slice(1) : (next === "0" ? "-" : "-" + next);
                else if (k === '.') { if (!next.includes('.')) next += '.'; }
                else next = (next === "0") ? k : next + k;
                setCurrentValue(next);
                const num = parseFloat(next) || 0;
                const { type, ri, pi } = activeField;
                const newDb = { ...db };
                if (type === 'score') newDb.currentSet.players[pi].scores[ri] = num;
                else if (type === 'chip') newDb.currentSet.players[pi].chip = num;
                else if (type === 'fee') newDb.currentSet.players[pi].fee = num;
                setDb(newDb);
            };

            const copyJsonToClipboard = () => {
                const text = JSON.stringify(db, null, 2);
                const dummy = document.createElement("textarea");
                document.body.appendChild(dummy);
                dummy.value = text;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
            };

            const downloadJson = () => {
                const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mahjong_data_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        setDb(imported);
                    } catch (err) { }
                };
                reader.readAsText(file);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-xl relative overflow-hidden font-sans text-slate-800">
                    <header className="p-4 bg-white border-b flex justify-between items-center shrink-0 z-40">
                        <div className="flex items-center gap-2">
                            <Icon name="Sparkles" className="text-emerald-500 w-5 h-5" />
                            <h1 className="text-lg font-black tracking-tighter italic uppercase">ScoreLog AI</h1>
                        </div>
                        <div className="flex gap-1 items-center">
                            <button onClick={copyJsonToClipboard} className="p-2 text-slate-300 hover:text-emerald-500 transition-colors" title="JSONコピー"><Icon name="Copy" className="w-4 h-4"/></button>
                            <button onClick={downloadJson} className="p-2 text-slate-300 hover:text-blue-500 transition-colors" title="エクスポート"><Icon name="Download" className="w-4 h-4"/></button>
                            <label className="p-2 text-slate-300 hover:text-purple-500 cursor-pointer transition-colors" title="インポート">
                                <Icon name="Upload" className="w-4 h-4"/>
                                <input type="file" className="hidden" accept=".json" onChange={handleFileUpload} />
                            </label>
                            <button onClick={() => { setJsonInput(JSON.stringify(db, null, 2)); setShowJsonEditor(true); }} className="p-2 text-slate-300 hover:text-orange-500 transition-colors" title="JSON編集"><Icon name="FileJson" className="w-4 h-4"/></button>
                            <button onClick={() => setShowNewSetModal(true)} className="bg-emerald-500 text-white p-2 ml-1 rounded-full shadow-lg active:scale-95 transition-transform"><Icon name="Plus" className="w-5 h-5" /></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar pb-32">
                        {activeTab === 'welcome' && (
                            <div className="flex flex-col items-center justify-center py-20 px-10 text-center space-y-6">
                                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center"><Icon name="Spade" className="w-10 h-10" /></div>
                                <h2 className="text-2xl font-black italic">記録を開始しましょう</h2>
                                <button onClick={() => setShowNewSetModal(true)} className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">新規対局を開始</button>
                            </div>
                        )}

                        {activeTab === 'input' && currentData && (
                            <div className="animate-in">
                                {viewingRecord && <div className="bg-emerald-600 p-2 text-white text-center text-[10px] font-black italic uppercase tracking-widest">閲覧モード</div>}
                                <div className="overflow-x-auto">
                                    <table className="w-full border-collapse table-fixed min-w-[320px] text-center">
                                        <thead>
                                            <tr className="bg-slate-100 text-[10px] font-black text-slate-500 italic uppercase">
                                                <th className="w-12 py-3 sticky left-0 bg-slate-100 z-10 border-r">半荘</th>
                                                {currentData.players.map((p, i) => <th key={i} className="py-3 border-l border-white truncate px-1">{p.name}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white">
                                            {currentData.players[0].scores.map((_, ri) => (
                                                <tr key={ri} className="border-b border-slate-50">
                                                    <td className="sticky left-0 bg-white z-10 py-4 text-xs font-bold text-slate-300 border-r">{ri + 1}</td>
                                                    {currentData.players.map((p, pi) => (
                                                        <td key={pi} onClick={() => !viewingRecord && (setActiveField({type:'score', ri, pi}), setCurrentValue(String(p.scores[ri])))} className={`p-1 cursor-pointer transition-colors ${activeField?.type === 'score' && activeField.ri === ri && activeField.pi === pi ? 'bg-emerald-50 ring-2 ring-emerald-500 ring-inset' : ''}`}>
                                                            <div className={`text-lg font-black ${p.scores[ri] > 0 ? 'text-emerald-600' : p.scores[ri] < 0 ? 'text-rose-500' : 'text-slate-300'}`}>{p.scores[ri]}</div>
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                            <tr className="bg-orange-50/30 border-t border-orange-100">
                                                <td className="sticky left-0 bg-white z-10 py-3 text-[10px] font-black text-orange-400 border-r italic uppercase">チップ</td>
                                                {currentData.players.map((p, pi) => (
                                                    <td key={pi} onClick={() => !viewingRecord && (setActiveField({type:'chip', pi}), setCurrentValue(String(p.chip || 0)))} className={`p-1 cursor-pointer ${activeField?.type === 'chip' && activeField.pi === pi ? 'bg-orange-100 ring-2 ring-orange-500 ring-inset' : ''}`}>
                                                        <div className="text-sm font-black text-orange-600">{p.chip || 0} 枚</div>
                                                    </td>
                                                ))}
                                            </tr>
                                            <tr className="bg-slate-50 border-t border-slate-200">
                                                <td className="sticky left-0 bg-white z-10 py-3 text-[10px] font-black text-slate-400 border-r italic uppercase">場代</td>
                                                {currentData.players.map((p, pi) => (
                                                    <td key={pi} onClick={() => !viewingRecord && (setActiveField({type:'fee', pi}), setCurrentValue(String(p.fee || 0)))} className={`p-1 cursor-pointer ${activeField?.type === 'fee' && activeField.pi === pi ? 'bg-slate-200 ring-2 ring-slate-400 ring-inset' : ''}`}>
                                                        <div className="text-[11px] font-black text-slate-500">{p.fee || 0} 円</div>
                                                    </td>
                                                ))}
                                            </tr>
                                        </tbody>
                                        <tfoot className="bg-slate-50 font-black text-sm">
                                            <tr className="border-t-2 border-slate-200">
                                                <td className="sticky left-0 bg-slate-50 py-3 text-[10px] italic border-r">スコア</td>
                                                {calculatedPlayers.map((p, i) => <td key={i} className="py-3">{p.scoreTotal.toFixed(1)}</td>)}
                                            </tr>
                                            <tr className="bg-slate-900 text-white text-xs">
                                                <td className="sticky left-0 bg-slate-900 py-4 text-[9px] italic border-r uppercase tracking-widest">精算額</td>
                                                {calculatedPlayers.map((p, i) => <td key={i} className={`py-4 font-black ${p.income >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{Math.round(p.income).toLocaleString()}</td>)}
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                                {!viewingRecord && (
                                    <div className="p-4 space-y-3">
                                        <button onClick={() => { const n = {...db}; n.currentSet.players.forEach(p => p.scores.push(0)); setDb(n); }} className="w-full py-3 bg-white border rounded-xl text-slate-500 font-bold hover:bg-slate-50 transition-colors">+ 半荘追加</button>
                                        <button onClick={() => { 
                                            const r = {...db.currentSet}; 
                                            r.players = calculatedPlayers.map(p => ({ ...p, settlement: p.income })); 
                                            setDb({ ...db, history: [r, ...db.history], currentSet: null }); 
                                            setActiveTab('history'); 
                                        }} className="w-full py-5 bg-emerald-500 text-white rounded-2xl font-black text-lg shadow-xl italic active:scale-95 transition-transform">保存して精算を確定</button>
                                    </div>
                                )}
                                {viewingRecord && <div className="p-4"><button onClick={() => { setViewingRecord(null); setActiveTab('history'); }} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black">履歴へ戻る</button></div>}
                            </div>
                        )}

                        {activeTab === 'analysis' && (
                            <div className="p-4 space-y-4 animate-in">
                                <h2 className="text-xl font-black italic flex items-center gap-2">
                                    <Icon name="Target" className="text-emerald-500" />
                                    相性分析
                                </h2>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">メンバーを選択（最大4名）</p>
                                <div className="bg-white p-2 rounded-2xl flex flex-wrap gap-2 border">
                                    {db.members.map(m => (
                                        <button key={m.id} onClick={() => setSelectedAnalysisMembers(prev => prev.includes(m.name) ? prev.filter(n => n !== m.name) : [...prev, m.name].slice(-4))} className={`px-4 py-2 rounded-full border text-xs font-bold transition-all ${selectedAnalysisMembers.includes(m.name) ? 'bg-emerald-500 text-white border-emerald-500 shadow-md' : 'bg-slate-50 text-slate-500 border-transparent'}`}>{m.name}</button>
                                    ))}
                                </div>
                                {selectedAnalysisMembers.map(target => (
                                    <div key={target} className="mt-6 animate-in">
                                        <div className="text-[10px] font-black text-emerald-600 italic bg-emerald-50 px-2 py-1 rounded inline-block mb-3 uppercase tracking-wider">{target} の対戦状況</div>
                                        <div className="space-y-2">
                                            {selectedAnalysisMembers.filter(n => n !== target).map(name => {
                                                let diffIncome = 0;
                                                let diffScore = 0;
                                                db.history.forEach(h => {
                                                    const p1 = h.players.find(p => p.name === target);
                                                    const p2 = h.players.find(p => p.name === name);
                                                    if (p1 && p2) {
                                                        diffIncome += (p1.settlement - p2.settlement);
                                                        diffScore += (p1.scoreTotal - p2.scoreTotal);
                                                    }
                                                });
                                                return (
                                                    <div key={name} className="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                                                        <span className="font-bold">{name}</span>
                                                        <div className="text-right">
                                                            <div className={`font-black ${diffIncome >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{diffIncome >= 0 ? '+' : ''}{Math.round(diffIncome).toLocaleString()} 円</div>
                                                            <div className="text-[10px] text-slate-300 font-black italic">{diffScore >= 0 ? '+' : ''}{diffScore.toFixed(1)} pt</div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="p-4 space-y-4 animate-in">
                                <h2 className="text-xl font-black italic uppercase flex items-center gap-2">
                                    <Icon name="BarChart3" className="text-emerald-500" />
                                    成績統計
                                </h2>
                                
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-white p-2 rounded-xl border">
                                        <label className="text-[9px] font-black text-slate-300 block mb-1">開始日</label>
                                        <input type="date" value={statStartDate} onChange={e => setStatStartDate(e.target.value)} className="w-full text-xs font-bold bg-transparent outline-none" />
                                    </div>
                                    <div className="bg-white p-2 rounded-xl border">
                                        <label className="text-[9px] font-black text-slate-300 block mb-1">終了日</label>
                                        <input type="date" value={statEndDate} onChange={e => setStatEndDate(e.target.value)} className="w-full text-xs font-bold bg-transparent outline-none" />
                                    </div>
                                </div>

                                <div className="flex bg-slate-200 p-1 rounded-xl text-[9px] font-black overflow-x-auto no-scrollbar gap-1">
                                    {[
                                        {id:'income', l:'収支(場代除)', icon: 'Coins'}, 
                                        {id:'scorePure', l:'スコア(チップ除)', icon: 'Target'}, 
                                        {id:'scoreWithChip', l:'スコア(込)', icon: 'Sparkles'},
                                        {id:'topRate', l:'トップ率', icon: 'Trophy'},
                                        {id:'renRate', l:'連対率', icon: 'Crown'},
                                        {id:'lastRate', l:'ラス率', icon: 'Skull'},
                                        {id:'avgRank', l:'平均順位', icon: 'Hash'}
                                    ].map(t => (
                                        <button key={t.id} onClick={() => setStatType(t.id)} className={`px-3 py-2 rounded-lg transition-all flex-shrink-0 flex items-center gap-1.5 ${statType === t.id ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}>
                                            <Icon name={t.icon} className="w-3 h-3" />
                                            {t.l}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="bg-white border rounded-[32px] p-5 shadow-sm h-56 relative">
                                    <canvas ref={chartRef}></canvas>
                                </div>

                                <div className="flex flex-wrap gap-2 py-2">
                                    {Object.keys(stats).map(name => (
                                        <button key={name} onClick={() => setStatSelectedNames(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name])} className={`px-3 py-1 rounded-full text-[10px] font-black transition-all border ${statSelectedNames.includes(name) ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-200'}`}>{name}</button>
                                    ))}
                                    {statSelectedNames.length > 0 && <button onClick={() => setStatSelectedNames([])} className="px-3 py-1 rounded-full text-[10px] font-black bg-rose-100 text-rose-500 border border-rose-100">解除</button>}
                                </div>

                                <div className="space-y-2 mt-2">
                                    {Object.entries(stats)
                                        .filter(([name]) => statSelectedNames.length === 0 || statSelectedNames.includes(name))
                                        .sort((a, b) => {
                                            if (statType === 'income') return b[1].income - a[1].income;
                                            if (statType === 'avgRank') return (a[1].ranks.reduce((x,y)=>x+y,0)/a[1].ranks.length) - (b[1].ranks.reduce((x,y)=>x+y,0)/b[1].ranks.length);
                                            return b[1].scorePure - a[1].scorePure;
                                        })
                                        .map(([name, s]) => {
                                            const total = s.ranks.length;
                                            const topCount = s.ranks.filter(r => r === 1).length;
                                            const secondCount = s.ranks.filter(r => r === 2).length;
                                            const lastCount = s.ranks.filter(r => r === 4).length;
                                            const avgRank = s.ranks.reduce((a, b) => a + b, 0) / total;
                                            
                                            let displayVal = "";
                                            if (statType === 'income') displayVal = `${Math.round(s.income).toLocaleString()} 円`;
                                            else if (statType === 'scorePure') displayVal = `${s.scorePure.toFixed(1)} pt`;
                                            else if (statType === 'scoreWithChip') displayVal = `${s.scoreWithChip.toFixed(1)} pt`;
                                            else if (statType === 'topRate') displayVal = `${((topCount/total)*100 || 0).toFixed(1)}%`;
                                            else if (statType === 'renRate') displayVal = `${(((topCount + secondCount)/total)*100 || 0).toFixed(1)}%`;
                                            else if (statType === 'lastRate') displayVal = `${((lastCount/total)*100 || 0).toFixed(1)}%`;
                                            else if (statType === 'avgRank') displayVal = `${(avgRank || 0).toFixed(2)} 位`;

                                            return (
                                                <div key={name} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                                                    <div className="font-black italic flex items-center gap-2">
                                                        <span className="w-2 h-2 rounded-full" style={{backgroundColor: colors[Object.keys(stats).indexOf(name) % colors.length]}}></span>
                                                        {name} <span className="text-[9px] text-slate-300 ml-1">{s.games}半荘</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className={`font-black ${s.income >= 0 || statType !== 'income' ? 'text-emerald-600' : 'text-rose-500'}`}>{displayVal}</div>
                                                        <div className="text-[8px] text-slate-300 font-bold uppercase tracking-widest">
                                                            1位:{topCount} / 2位:{secondCount} / 4位:{lastCount}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    }
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="p-4 space-y-3 animate-in">
                                <h2 className="text-xl font-black italic uppercase flex items-center gap-2">
                                    <Icon name="Archive" className="text-emerald-500" />
                                    対局履歴
                                </h2>
                                {db.history.length === 0 && <div className="text-center py-20 text-slate-300 font-bold italic uppercase">No Records</div>}
                                {db.history.map((h, i) => (
                                    <div key={i} onClick={() => { setViewingRecord(h); setActiveTab('input'); }} className="bg-white p-4 rounded-2xl border shadow-sm cursor-pointer hover:border-emerald-200 transition-all group">
                                        <div className="flex justify-between items-center border-b mb-3 pb-2 text-[9px] text-slate-400 font-black italic uppercase">
                                            <span>{new Date(h.date).toLocaleString('ja-JP')}</span>
                                            <button onClick={(e) => { e.stopPropagation(); if(confirm("削除しますか？")) { const n = [...db.history]; n.splice(i, 1); setDb({...db, history: n}); }}} className="text-slate-300 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100"><Icon name="Trash2" className="w-3 h-3"/></button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-xs">
                                            {h.players.map((p, pi) => (
                                                <div key={pi} className="flex justify-between border-b border-slate-50 pb-1">
                                                    <span className="text-slate-500 truncate">{p.name}</span>
                                                    <span className={`font-black ${p.settlement >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{Math.round(p.settlement).toLocaleString()}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'members' && (
                            <div className="p-4 space-y-4 animate-in">
                                <h2 className="text-xl font-black italic uppercase flex items-center gap-2">
                                    <Icon name="Users" className="text-emerald-500" />
                                    名簿管理
                                </h2>
                                <div className="space-y-2">
                                    {db.members.map(m => (
                                        <div key={m.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm group">
                                            <span className="font-bold">{m.name}</span>
                                            <button onClick={() => { if(confirm("削除しますか？")) setDb({...db, members: db.members.filter(mem => mem.id !== m.id)}); }} className="text-slate-200 group-hover:text-rose-500 transition-colors"><Icon name="UserMinus" /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { const n = prompt("名前を入力"); if(n) setDb({...db, members: [...db.members, {id: Date.now(), name: n}]}); }} className="w-full py-4 bg-white border-2 border-dashed border-slate-200 rounded-2xl text-slate-300 font-bold hover:text-emerald-500 hover:border-emerald-500 transition-all">+ メンバーを追加</button>
                                
                                <div className="mt-8 border-t pt-4">
                                    <h3 className="text-[10px] font-black text-slate-300 uppercase mb-3">詳細設定</h3>
                                    <button onClick={() => { setJsonInput(JSON.stringify(db, null, 2)); setShowJsonEditor(true); }} className="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-bold shadow-lg flex items-center justify-center gap-2">
                                        <Icon name="FileJson" className="w-4 h-4"/>
                                        データをJSONで直接編集
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md border-t flex justify-around items-center h-16 z-30 pb-safe">
                        {[
                            {id: 'input', icon: 'Edit3', label: '対局'},
                            {id: 'analysis', icon: 'Target', label: '分析'},
                            {id: 'stats', icon: 'BarChart3', label: '統計'},
                            {id: 'history', icon: 'Archive', label: '履歴'},
                            {id: 'members', icon: 'Users', label: '名簿'}
                        ].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center flex-1 py-1 transition-all ${activeTab === t.id ? 'text-emerald-500 scale-110' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name={t.icon} className="w-5 h-5"/>
                                <span className="text-[9px] font-bold mt-1 tracking-tighter">{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    <div className={`fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-100 p-4 shadow-2xl z-50 rounded-t-[32px] transition-transform duration-300 ease-in-out ${activeField ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="flex justify-between items-center mb-3 px-4">
                            <span className="font-black text-slate-400 text-[10px] italic uppercase tracking-widest">
                                {activeField?.type === 'score' ? 'スコア入力' : activeField?.type === 'chip' ? 'チップ入力' : '場代入力'}
                            </span>
                            <span className="text-2xl font-black text-emerald-600 tabular-nums">{currentValue}</span>
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                            {['7','8','9','Delete','4','5','6','-','1','2','3','Clear','0','00','.','Done'].map((k) => (
                                <button key={k} onClick={() => k === 'Done' ? setActiveField(null) : k === 'Delete' ? keyPress('back') : k === 'Clear' ? keyPress('clear') : keyPress(k)} className={`h-14 rounded-2xl font-black text-lg flex items-center justify-center shadow-sm active:scale-95 transition-transform ${k === 'Done' ? 'bg-emerald-500 text-white' : 'bg-white text-slate-800 hover:bg-slate-50'}`}>
                                    {k === 'Delete' ? <Icon name="Delete" /> : k === 'Done' ? <Icon name="Check" /> : k}
                                </button>
                            ))}
                        </div>
                    </div>

                    {showNewSetModal && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-6 animate-in">
                            <div className="bg-white w-full rounded-[40px] p-8 space-y-6 shadow-2xl overflow-hidden relative">
                                <h3 className="text-xl font-black text-center italic uppercase tracking-widest relative z-10">新規セッション</h3>
                                <p className="text-[10px] text-center text-slate-400 font-bold -mt-4">対局メンバーを選択（3〜4名）</p>
                                <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto no-scrollbar relative z-10 p-1">
                                    {db.members.map(m => (
                                        <button key={m.id} onClick={() => setModalSetup(prev => ({...prev, selectedIds: prev.selectedIds.includes(m.id) ? prev.selectedIds.filter(id => id !== m.id) : [...prev.selectedIds, m.id]}))} className={`p-4 rounded-2xl text-xs font-black border-2 transition-all ${modalSetup.selectedIds.includes(m.id) ? 'bg-emerald-500 border-emerald-500 text-white shadow-md' : 'bg-slate-50 border-transparent text-slate-400'}`}>{m.name}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-4 relative z-10">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-300 uppercase">レート (点/円)</label>
                                        <input type="number" value={modalSetup.rate} onChange={e => setModalSetup({...modalSetup, rate: Number(e.target.value)})} className="w-full bg-slate-50 p-3 rounded-xl text-sm font-black outline-none border-2 border-transparent focus:border-emerald-500" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-300 uppercase">チップ (1枚/円)</label>
                                        <input type="number" value={modalSetup.chipRate} onChange={e => setModalSetup({...modalSetup, chipRate: Number(e.target.value)})} className="w-full bg-slate-50 p-3 rounded-xl text-sm font-black outline-none border-2 border-transparent focus:border-emerald-500" />
                                    </div>
                                </div>
                                <button onClick={() => {
                                    const selected = db.members.filter(m => modalSetup.selectedIds.includes(m.id));
                                    if(selected.length < 3) return;
                                    setDb({...db, currentSet: { date: new Date().toISOString(), rate: modalSetup.rate, chipRate: modalSetup.chipRate, players: selected.map(m => ({ name: m.name, scores: [0], chip: 0, fee: 0 })) }});
                                    setShowNewSetModal(false);
                                    setActiveTab('input');
                                }} className="w-full py-5 bg-emerald-500 text-white rounded-[24px] font-black italic shadow-lg shadow-emerald-200 active:scale-95 transition-transform relative z-10">対局スタート</button>
                                <button onClick={() => setShowNewSetModal(false)} className="w-full text-slate-300 text-[10px] font-black uppercase tracking-widest relative z-10">キャンセル</button>
                            </div>
                        </div>
                    )}

                    {showJsonEditor && (
                        <div className="fixed inset-0 bg-black/80 z-[100] p-6 flex flex-col animate-in">
                            <div className="bg-white flex-1 rounded-[32px] p-6 flex flex-col space-y-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black italic uppercase text-sm">JSON データ編集</h3>
                                    <button onClick={() => setShowJsonEditor(false)} className="p-2"><Icon name="X" /></button>
                                </div>
                                <p className="text-[10px] text-slate-400 font-bold">テキストを書き換えると全データが更新されます。</p>
                                <textarea value={jsonInput} onChange={e => setJsonInput(e.target.value)} className="flex-1 bg-slate-50 border rounded-2xl p-4 font-mono text-[10px] outline-none focus:ring-2 ring-emerald-500 no-scrollbar"></textarea>
                                <div className="flex gap-2">
                                    <button onClick={() => { copyJsonToClipboard(); alert("コピーしました"); }} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-xs uppercase">コピー</button>
                                    <button onClick={() => { try { setDb(JSON.parse(jsonInput)); setShowJsonEditor(false); } catch(e) { } }} className="flex-[2] py-4 bg-emerald-500 text-white rounded-2xl font-black text-xs shadow-lg uppercase">データを保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
